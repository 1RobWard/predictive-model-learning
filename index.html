    inline2:()=>`<div style="background:${C.white};border-radius:10px;padding:20px"><div class="grid-2" style="gap:16px">
      ${[{dir:"Forward",arrow:"\u2192",from:"30 farm variables",to:"Predicted nutrient density",col:C.teal,use:"Reward farmers for practices predicted to produce high-nutrient food"},
        {dir:"Reverse",arrow:"\u2190",from:"Food biomarkers (lab test)",to:"Inferred farming system",col:C.berry,use:"Verify claims by working backwards from the food itself"}
      ].map(m=>`<div style="border:2px solid ${m.col};border-radius:8px;padding:16px"><div style="font-weight:800;color:${m.col};margin-bottom:8px">${m.dir} Model</div><div style="font-size:12px;color:${C.soil};margin-bottom:4px">${m.from} ${m.arrow} <strong>${m.to}</strong></div><div style="font-size:11px;color:${C.grey};background:${m.col}10;border-radius:6px;padding:8px;margin-top:8px">${m.use}</div></div>`).join("")}</div></div>`,
    inline3:()=>`<div style="background:${C.white};border-radius:10px;padding:20px"><div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:12px">The Three Main Data Quality Problems</div>
      ${[{issue:"Missing Values",icon:"\u2753",col:C.amber,example:"Farm 14 didn\u2019t complete the nitrogen rate question",fix:"Multiple imputation \u2014 fill using the most likely value given other variables."},
        {issue:"Outliers",icon:"\u26a0\ufe0f",col:C.berry,example:"Farm 7 reports soil pH of 12.3 (impossible in UK agriculture)",fix:"Flag for manual review. If genuine, keep but note. If data entry error, exclude."},
        {issue:"Class Imbalance",icon:"\ud83d\udcc9",col:C.teal,example:"Only 4 of 30 farms use no-till \u2014 model may rarely predict it",fix:"Oversampling (SMOTE), undersampling, or class-weighted loss function."}
      ].map(r=>`<div style="border:1px solid ${r.col}30;border-left:4px solid ${r.col};border-radius:6px;padding:14px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:18px">${r.icon}</span><div style="font-weight:700;color:${r.col};font-size:13px">${r.issue}</div></div><div style="font-size:11px;color:${C.grey};margin-bottom:6px;font-style:italic">${r.example}</div><div style="font-size:11px;color:${C.soil};background:${r.col}08;border-radius:4px;padding:8px"><strong>Fix:</strong> ${r.fix}</div></div>`).join("")}</div>`,
    inline4:()=>`<div style="background:${C.white};border-radius:10px;padding:20px"><div class="grid-2" style="gap:16px">
      ${[{type:"Supervised",col:C.teal,emoji:"\ud83c\udf93",desc:"You provide labelled examples: for each farm, you know the input AND the correct answer. The model learns the mapping.",uses:["Forward model: practices \u2192 nutrients","Reverse model: food markers \u2192 farm type","XGBoost, GLMM, Random Forest"]},
        {type:"Unsupervised",col:C.berry,emoji:"\ud83d\udd0d",desc:"No labels \u2014 you look for hidden structure in the data without knowing the answer in advance.",uses:["PCA on metabolomics data","Clustering farms by practice type","Dimensionality reduction"]}
      ].map(m=>`<div style="border:2px solid ${m.col};border-radius:8px;padding:16px"><div style="font-size:24px;margin-bottom:6px">${m.emoji}</div><div style="font-weight:800;color:${m.col};font-size:14px;margin-bottom:8px">${m.type} Learning</div><div style="font-size:12px;color:${C.grey};margin-bottom:12px;line-height:1.6">${m.desc}</div><div style="font-size:11px;font-weight:700;color:${m.col};margin-bottom:4px">Used by Vitagri for:</div>${m.uses.map(u=>`<div style="font-size:11px;color:${C.soil};padding:3px 0;display:flex;gap:6px;align-items:center"><span style="color:${m.col}">\u25b8</span> ${u}</div>`).join("")}</div>`).join("")}</div></div>`,
    inline5:()=>`<div style="background:${C.white};border-radius:10px;padding:20px"><div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:12px">The GLMM Ladder \u2014 Each Step Adds One Extension</div>
      ${[{step:"Simple Linear Regression",formula:"y = \u03b2\u2080 + \u03b2\u2081x\u2081",note:"Only one predictor.",col:C.grey},
        {step:"Multiple Linear Regression",formula:"y = \u03b2\u2080 + \u03b2\u2081x\u2081 + \u03b2\u2082x\u2082 + \u2026",note:"Many predictors. But assumes all observations are independent.",col:C.amber},
        {step:"GLM",formula:"g(y) = \u03b2\u2080 + \u03b2\u2081x\u2081 + \u2026",note:"Handles non-normal outcomes. Still assumes independence.",col:C.lime},
        {step:"GLMM (Mixed Model)",formula:"g(y) = \u03b2\u2080 + \u03b2\u2081x\u2081 + \u2026 + u\u2c7c",note:"Handles non-normal outcomes AND nested/clustered data. This is what Vitagri needs.",col:C.teal}
      ].map((r,i)=>`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;opacity:${i<3?.8:1}"><div style="width:24px;height:24px;border-radius:50%;background:${r.col};color:${C.white};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</div><div style="flex:1;border:1px solid ${r.col}40;border-left:3px solid ${r.col};border-radius:6px;padding:10px"><div style="font-weight:700;color:${r.col};font-size:12px">${r.step}</div><div style="font-family:monospace;font-size:11px;color:${C.soil};margin:4px 0;background:${C.parch};padding:4px 8px;border-radius:4px">${r.formula}</div><div style="font-size:11px;color:${C.grey}">${r.note}</div></div></div>`).join("")}</div>`,
    inline6:()=>`<div style="background:${C.white};border-radius:10px;padding:20px"><div class="grid-2" style="gap:16px">
      ${[{name:"Alpha Diversity",icon:"\ud83d\udd2c",col:C.teal,desc:"Diversity WITHIN a single farm.",metrics:["Shannon Index: species count + evenness","Simpson Index: probability two random organisms are same species","Species richness: simple count of unique species"],example:"Farm A: Shannon = 3.8 (diverse) vs Farm B: Shannon = 1.2 (dominated by one species)"},
        {name:"Beta Diversity",icon:"\ud83d\uddfa\ufe0f",col:C.berry,desc:"Diversity BETWEEN farms.",metrics:["Bray-Curtis dissimilarity: 0 = identical, 1 = completely different","UniFrac: accounts for evolutionary distance","Jaccard similarity: proportion of shared species"],example:"Farm A and Farm C: Bray-Curtis = 0.82 (very different communities)"}
      ].map(m=>`<div style="border:2px solid ${m.col};border-radius:8px;padding:16px"><div style="font-size:20px;margin-bottom:6px">${m.icon}</div><div style="font-weight:800;color:${m.col};font-size:13px;margin-bottom:6px">${m.name}</div><div style="font-size:11px;color:${C.grey};margin-bottom:10px;line-height:1.5">${m.desc}</div>${m.metrics.map(mt=>`<div style="font-size:11px;color:${C.soil};padding:3px 0;display:flex;gap:6px"><span style="color:${m.col};flex-shrink:0">\u25b8</span> ${mt}</div>`).join("")}<div style="background:${m.col}10;border-radius:6px;padding:8px;margin-top:10px;font-size:11px;color:${C.soil};font-style:italic">${m.example}</div></div>`).join("")}</div></div>`,
    inline7:()=>`<div style="background:${C.white};border-radius:10px;overflow:hidden"><div style="background:${C.soil};padding:10px 16px"><div style="color:${C.amber};font-weight:700;font-size:12px">Reverse Model: Food Biomarkers That Reveal Farming System</div></div><div style="overflow-x:auto"><table class="data-table"><thead><tr style="background:${C.parch}">${["Biomarker","What It Signals","Associated Practice","Threshold"].map(h=>`<th style="border-bottom:2px solid ${C.berry}">${h}</th>`).join("")}</tr></thead><tbody>
      ${[["C15:0 + C17:0","Ruminant access to pasture","Grass-based livestock",">0.5% of fatty acids"],["Omega-3:Omega-6","Dietary fat balance","Pasture vs grain feeding","<4:1 ratio"],["CLA","Pasture fermentation","Outdoor grazing",">0.5g/100g fat"],["Alpha diversity","Soil ecosystem health","No-till + cover crops","Shannon >3.2"],["Polyphenol diversity","Plant stress responses","Low synthetic input",">12 distinct polyphenols"]].map((r,i)=>`<tr><td style="color:${C.berry};font-weight:700;font-size:11px">${r[0]}</td><td style="font-size:11px">${r[1]}</td><td style="font-size:11px">${r[2]}</td><td style="color:${C.teal};font-size:11px">${r[3]}</td></tr>`).join("")}</tbody></table></div><div style="padding:10px 16px;background:${C.cream};font-size:11px;color:${C.grey}">These biomarkers cannot be faked \u2014 they arise from fundamental biochemical pathways.</div></div>`,
    inline8:()=>`<div style="background:${C.white};border-radius:10px;padding:20px"><div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:12px">Building Unassailable Scientific Credibility</div>
      ${[{icon:"\ud83d\udccb",title:"Pre-Registration",desc:"Register hypotheses at OSF.io before data collection. Prevents p-hacking.",target:"Before Phase 1"},
        {icon:"\ud83d\udd13",title:"Open-Source Code",desc:"All code published on GitHub with full version history.",target:"Phase 8"},
        {icon:"\ud83d\udd2c",title:"External Validation",desc:"5 farms outside training set for independent testing.",target:"Phase 6"},
        {icon:"\ud83d\udcf0",title:"Peer Review",desc:"Submit to Journal of the Science of Food and Agriculture or PLOS ONE.",target:"Year 2"},
        {icon:"\ud83e\udd1d",title:"Academic Partnership",desc:"Co-authorship with university researchers provides institutional credibility.",target:"Ongoing"}
      ].map(r=>`<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid ${C.lgrey}"><span style="font-size:20px">${r.icon}</span><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700;color:${C.soil};font-size:12px">${r.title}</div><div style="font-size:10px;color:${C.teal};font-weight:600;background:${C.teal}10;padding:2px 8px;border-radius:10px">${r.target}</div></div><div style="font-size:11px;color:${C.grey};margin-top:4px;line-height:1.5">${r.desc}</div></div></div>`).join("")}</div>`,
    inline9:()=>`<div style="background:${C.white};border-radius:10px;padding:20px"><div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:12px">What the Model Cannot Do \u2014 And Must Say So</div><div class="grid-2">
      ${[{limit:"Causal Claims",icon:"\u26a0\ufe0f",col:C.berry,detail:"The model identifies ASSOCIATIONS, not causation. Controlled trials would be needed for causal proof."},
        {limit:"Geographic Generalisation",icon:"\ud83d\uddfa\ufe0f",col:C.amber,detail:"A model trained on 30 UK farms may not generalise to Spain or Kenya. Separate calibration needed per region."},
        {limit:"Temporal Drift",icon:"\u23f0",col:C.teal,detail:"A model trained in 2025 may perform poorly on 2030 data. Quarterly retraining is essential."},
        {limit:"Novel Farm Types",icon:"\ud83d\udd2e",col:C.grey,detail:"The model extrapolates poorly for farms unlike anything in training. Agroforestry may get low confidence simply due to lack of examples."}
      ].map(r=>`<div style="border:1px solid ${r.col}40;border-left:3px solid ${r.col};border-radius:6px;padding:12px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:16px">${r.icon}</span><div style="font-weight:700;color:${r.col};font-size:12px">${r.limit}</div></div><div style="font-size:11px;color:${C.grey};line-height:1.5">${r.detail}</div></div>`).join("")}
    </div><div style="background:${C.teal}10;border-radius:6px;padding:12px;margin-top:12px"><div style="font-weight:700;color:${C.tealDk};margin-bottom:4px;font-size:12px">Why Transparency Builds Trust</div><div style="font-size:11px;color:${C.grey}">Scientists and policymakers trust systems that acknowledge limitations more than those that claim universal validity.</div></div></div>`,
  };
  if(inlines[key])el.innerHTML=inlines[key]();
}

// ─── RENDER ENGINE ─────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(state.view==="home") renderHome(app);
  else if(state.view==="study"&&!state.quizMode) renderStudy(app);
  else if(state.view==="study"&&state.quizMode) renderQuiz(app);
}

function renderHome(app){
  const pct=state.completed.length/modules.length*100;
  app.innerHTML=`
    <div class="site-header"><div class="container">
      <div class="logo"><div class="logo-icon">\ud83c\udf31</div><div class="logo-text"><h1>Vitagri</h1><p>Predictive Model Learning System</p></div></div>
      <div class="subtitle">10 visual modules from novice to expert \u2014 complete each quiz at 80%+ to unlock the next</div>
      <div class="progress-box"><div class="progress-row"><span class="progress-label">Overall Progress</span><span class="progress-count">${state.completed.length}/${modules.length} modules</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    </div></div>
    <div class="container"><div class="module-grid" id="module-grid"></div></div>`;
  const grid=document.getElementById('module-grid');
  modules.forEach((mod,i)=>{
    const unlocked=i===0||state.completed.includes(i);
    const done=state.completed.includes(mod.id);
    const card=document.createElement('div');
    card.className=`module-card ${done?"done":unlocked?"unlocked":"locked"}`;
    card.innerHTML=`
      ${done?'<div class="module-badge done-badge">\u2713 DONE</div>':''}
      ${!unlocked?'<div class="module-badge lock-badge">\ud83d\udd12</div>':''}
      <div class="module-icon">${mod.icon}</div>
      <div class="module-label">Module ${mod.id}</div>
      <div class="module-title">${mod.title}</div>
      <div class="module-meta">${mod.sections.length} sections \u00b7 ${mod.quiz.length} quiz questions</div>`;
    if(unlocked)card.addEventListener('click',()=>{state.currentModuleId=mod.id;state.currentSection=0;state.quizMode=false;state.quizAnswers={};state.submitted=false;state.view="study";render();window.scrollTo(0,0)});
    grid.appendChild(card);
  });
}

function renderStudy(app){
  const mod=modules.find(m=>m.id===state.currentModuleId);
  const sec=mod.sections[state.currentSection];
  app.innerHTML=`
    <div class="study-header"><div class="container"><div class="inner">
      <button class="btn-ghost" id="back-home">\u2190 All Modules</button>
      <div class="title">${mod.icon} ${mod.title}</div>
      <button class="btn-teal" id="go-quiz">Take Quiz \u2192</button>
    </div></div></div>
    <div class="container">
      <div class="section-nav" id="sec-nav"></div>
      <div class="fade-in">
        <h2 class="section-heading">${sec.heading}</h2>
        <div id="visual-mount" style="margin:20px 0"></div>
        <p class="section-body">${sec.body}</p>
        <div class="section-footer">
          ${state.currentSection>0?`<button class="pill" id="prev-sec" style="border-color:${C.teal};color:${C.teal};padding:8px 18px">\u2190 Previous</button>`:'<div></div>'}
          ${state.currentSection<mod.sections.length-1?`<button class="btn-teal" id="next-sec" style="padding:8px 20px">Next Section \u2192</button>`:`<button class="btn-amber" id="start-quiz">Start Quiz \u2192</button>`}
        </div>
      </div>
    </div>`;
  // Mount visual
  const mount=document.getElementById('visual-mount');
  if(sec.visual&&visuals[sec.visual]){
    if(sec.dark)mount.className='visual-dark';else mount.className='visual-box';
    visuals[sec.visual](mount);
  } else if(sec.visual&&sec.visual.startsWith('inline')){
    mount.className='';
    mount.style.margin='20px 0';
    renderInlineVisual(sec.visual,mount);
  }
  // Section nav
  const nav=document.getElementById('sec-nav');
  mod.sections.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className=`section-btn ${i===state.currentSection?"active":""}`;
    btn.textContent=`${i+1}. ${s.heading.split("\u2014")[0].trim().slice(0,22)}${s.heading.length>22?"\u2026":""}`;
    btn.addEventListener('click',()=>{state.currentSection=i;render();window.scrollTo(0,0)});
    nav.appendChild(btn);
  });
  // Events
  document.getElementById('back-home')?.addEventListener('click',()=>{state.view="home";render()});
  document.getElementById('go-quiz')?.addEventListener('click',goQuiz);
  document.getElementById('start-quiz')?.addEventListener('click',goQuiz);
  document.getElementById('prev-sec')?.addEventListener('click',()=>{state.currentSection--;render();window.scrollTo(0,0)});
  document.getElementById('next-sec')?.addEventListener('click',()=>{state.currentSection++;render();window.scrollTo(0,0)});
}

function goQuiz(){state.quizMode=true;state.quizAnswers={};state.submitted=false;render();window.scrollTo(0,0)}

function renderQuiz(app){
  const mod=modules.find(m=>m.id===state.currentModuleId);
  const answered=Object.keys(state.quizAnswers).length;
  if(state.submitted){
    const score=mod.quiz.filter((_,i)=>state.quizAnswers[i]===mod.quiz[i].correct).length;
    const passed=score/mod.quiz.length>=.8;
    if(passed&&!state.completed.includes(mod.id)){state.completed.push(mod.id);saveCompleted()}
    app.innerHTML=`
      <div class="study-header"><div class="container"><div class="inner">
        <button class="btn-ghost" id="back-study">\u2190 Back to Study</button>
        <div class="title">Quiz: ${mod.title}</div>
        <div style="color:${C.amber};font-size:12px">${answered}/${mod.quiz.length} answered</div>
      </div></div></div>
      <div class="container" style="padding-top:28px;padding-bottom:60px">
        <div class="quiz-result ${passed?"passed":"failed"}">
          <div style="font-size:48px;margin-bottom:8px">${passed?"\ud83c\udf89":"\ud83d\udcda"}</div>
          <div class="quiz-score" style="color:${passed?C.teal:C.berry}">${score}/${mod.quiz.length}</div>
          <div style="font-size:16px;font-weight:700;color:${C.soil};margin-bottom:8px">${passed?"Module Passed! \u2713":"Keep Studying \u2014 you need 80%"}</div>
          <div style="font-size:13px;color:${C.grey}">Score: ${(score/mod.quiz.length*100).toFixed(0)}%</div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap">
            ${!passed?`<button class="btn-teal" id="retry" style="padding:10px 20px;font-size:13px">Try Again</button><button class="pill" id="review" style="border-color:${C.teal};color:${C.teal};padding:10px 20px">Review Materials</button>`:`<button class="btn-teal" id="back-all" style="padding:10px 24px;font-size:14px">\u2190 Back to All Modules</button>`}
          </div>
        </div>
        <div id="quiz-review"></div>
      </div>`;
    const review=document.getElementById('quiz-review');
    mod.quiz.forEach((q,i)=>{
      const correct=state.quizAnswers[i]===q.correct;
      const div=document.createElement('div');
      div.className=`quiz-question ${correct?"correct":"wrong"}`;
      div.innerHTML=`<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px"><span style="font-size:18px;flex-shrink:0">${correct?"\u2705":"\u274c"}</span><div class="quiz-q">${q.q}</div></div>
        ${q.options.map((opt,j)=>{
          let cls="quiz-opt";
          if(j===q.correct)cls+=" correct-answer";
          else if(j===state.quizAnswers[i]&&j!==q.correct)cls+=" wrong-answer";
          return`<div class="${cls}" style="cursor:default">${opt}</div>`;
        }).join("")}`;
      review.appendChild(div);
    });
    document.getElementById('retry')?.addEventListener('click',()=>{state.quizAnswers={};state.submitted=false;render();window.scrollTo(0,0)});
    document.getElementById('review')?.addEventListener('click',()=>{state.quizMode=false;state.currentSection=0;render();window.scrollTo(0,0)});
    document.getElementById('back-all')?.addEventListener('click',()=>{state.view="home";render()});
    document.getElementById('back-study')?.addEventListener('click',()=>{state.quizMode=false;render()});
  } else {
    app.innerHTML=`
      <div class="study-header"><div class="container"><div class="inner">
        <button class="btn-ghost" id="back-study">\u2190 Back to Study</button>
        <div class="title">Quiz: ${mod.title}</div>
        <div style="color:${C.amber};font-size:12px">${answered}/${mod.quiz.length} answered</div>
      </div></div></div>
      <div class="container" style="padding-top:28px;padding-bottom:60px"><div id="quiz-questions"></div>
        <div style="text-align:center;margin-top:20px">
          <button class="btn-teal" id="submit-quiz" style="padding:12px 32px;font-size:14px;opacity:${answered===mod.quiz.length?1:.5}" ${answered<mod.quiz.length?"disabled":""}>Submit Quiz</button>
          ${answered<mod.quiz.length?`<div style="font-size:11px;color:${C.grey};margin-top:8px">Answer all ${mod.quiz.length} questions to submit</div>`:""}
        </div>
      </div>`;
    const container=document.getElementById('quiz-questions');
    mod.quiz.forEach((q,i)=>{
      const div=document.createElement('div');
      div.className='quiz-question';
      div.innerHTML=`<div class="quiz-q">${i+1}. ${q.q}</div>`;
      q.options.forEach((opt,j)=>{
        const btn=document.createElement('button');
        btn.className=`quiz-opt ${state.quizAnswers[i]===j?"selected":""}`;
        btn.textContent=opt;
        btn.addEventListener('click',()=>{state.quizAnswers[i]=j;render();});
        div.appendChild(btn);
      });
      container.appendChild(div);
    });
    document.getElementById('submit-quiz')?.addEventListener('click',()=>{if(answered===mod.quiz.length){state.submitted=true;render();window.scrollTo(0,0)}});
    document.getElementById('back-study')?.addEventListener('click',()=>{state.quizMode=false;render()});
  }
}

// ─── BOOT ──────────────────────────────────────────────────────
render();
</script>
</body>
</html>
