<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitagri & Bionutrient Institute — Predictive Model Learning System</title>
<meta name="description" content="Interactive learning platform for the Vitagri & Bionutrient Institute bidirectional predictive nutrient density model. 10 modules from novice to expert.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --soil:#1c1510;--teal:#2a9d8f;--teal-dk:#1f7268;--berry:#8B2783;
  --lime:#9FB04F;--amber:#e9a84c;--cream:#faf7f2;--parch:#f5f0e8;
  --white:#ffffff;--grey:#6b7280;--lgrey:#e5e7eb;--red:#e74c3c;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--soil);line-height:1.6;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;transition:all .2s}
button:hover{filter:brightness(1.08)}
.container{max-width:800px;margin:0 auto;padding:0 24px}

/* Header */
.site-header{background:var(--soil);padding:40px 0 32px}
.site-header .logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.site-header .logo-icon{width:44px;height:44px;border-radius:10px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:22px}
.site-header .logo-text h1{color:var(--amber);font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
.site-header .logo-text p{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.site-header .subtitle{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:24px;line-height:1.6}
.progress-box{background:rgba(255,255,255,.05);border-radius:10px;padding:16px}
.progress-row{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-label{color:rgba(255,255,255,.6);font-size:12px}
.progress-count{color:var(--amber);font-weight:700;font-size:12px}
.progress-bar{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .5s ease}

/* Module Grid */
.module-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:32px 0 60px}
@media(max-width:600px){.module-grid{grid-template-columns:1fr}}
.module-card{background:var(--white);border-radius:12px;padding:22px;border:2px solid var(--lgrey);position:relative;overflow:hidden;transition:all .2s}
.module-card.unlocked{cursor:pointer}
.module-card.unlocked:hover{border-color:var(--teal);box-shadow:0 4px 20px rgba(42,157,143,.12)}
.module-card.locked{opacity:.5;cursor:not-allowed}
.module-card.done{border-color:var(--teal)}
.module-badge{position:absolute;top:0;right:0;font-size:10px;font-weight:700;padding:4px 12px;border-radius:0 10px 0 10px;color:var(--white)}
.module-badge.done-badge{background:var(--teal)}
.module-badge.lock-badge{background:var(--grey)}
.module-icon{font-size:28px;margin-bottom:10px}
.module-label{font-size:10px;color:var(--teal);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.module-title{font-weight:700;font-size:14px;line-height:1.3;margin-bottom:6px}
.module-meta{font-size:11px;color:var(--grey)}

/* Study View */
.study-header{background:var(--soil);padding:14px 0;position:sticky;top:0;z-index:100}
.study-header .inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.study-header .title{color:var(--white);font-weight:700;font-size:13px;text-align:center;flex:1}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:6px;padding:6px 14px;font-size:12px}
.btn-teal{background:var(--teal);border:none;color:var(--white);border-radius:6px;padding:6px 16px;font-size:12px;font-weight:700}
.btn-amber{background:var(--amber);border:none;color:var(--soil);border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700}

/* Section Nav */
.section-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;padding-top:28px}
.section-btn{background:transparent;color:var(--teal);border:1px solid var(--teal);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600}
.section-btn.active{background:var(--teal);color:var(--white)}

/* Section Content */
.section-heading{font-size:20px;font-weight:800;color:var(--soil);margin-bottom:8px;line-height:1.3}
.section-body{font-size:14px;color:#374151;line-height:1.75;margin-bottom:20px}
.section-footer{display:flex;justify-content:space-between;gap:10px;margin-bottom:40px}

/* Visual Components */
.visual-box{margin:20px 0;background:var(--white);border-radius:10px;padding:20px}
.visual-title{font-weight:700;color:var(--soil);font-size:13px;margin-bottom:4px}
.visual-desc{font-size:11px;color:var(--grey);margin-bottom:12px}
.visual-dark{background:#0d1a16;border-radius:12px;padding:24px;margin:20px 0}
.insight-box{border-radius:6px;padding:10px;font-size:11px;margin-top:8px}

/* Data Table */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;color:var(--soil);font-weight:700;font-size:11px;background:var(--parch)}
.data-table td{padding:8px 12px}
.data-table tr:nth-child(even){background:var(--cream)}
.data-table tr{border-bottom:1px solid var(--lgrey)}

/* Quiz */
.quiz-result{border-radius:12px;padding:28px;text-align:center;margin-bottom:24px;border:2px solid}
.quiz-result.passed{background:rgba(42,157,143,.08);border-color:var(--teal)}
.quiz-result.failed{background:rgba(139,39,131,.08);border-color:var(--berry)}
.quiz-score{font-size:48px;font-weight:800;margin:8px 0}
.quiz-question{background:var(--white);border-radius:10px;padding:18px;margin-bottom:12px;border:1px solid var(--lgrey)}
.quiz-question.correct{border-color:var(--teal);border-left:4px solid var(--teal)}
.quiz-question.wrong{border-color:var(--berry);border-left:4px solid var(--berry)}
.quiz-q{font-weight:700;font-size:13px;line-height:1.4;margin-bottom:12px}
.quiz-opt{display:block;width:100%;text-align:left;background:var(--cream);border:2px solid transparent;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:12px;color:var(--soil);transition:all .15s}
.quiz-opt:hover{border-color:var(--teal);background:rgba(42,157,143,.06)}
.quiz-opt.selected{border-color:var(--teal);background:rgba(42,157,143,.1);font-weight:600}
.quiz-opt.correct-answer{border-color:var(--teal);background:rgba(42,157,143,.15)}
.quiz-opt.wrong-answer{border-color:var(--berry);background:rgba(139,39,131,.1)}

/* Grid helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:600px){.grid-4{grid-template-columns:repeat(2,1fr)}}

/* Pill buttons */
.pill{border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;border:1px solid}
.pill.active{color:var(--white)}

/* Slider */
input[type=range]{width:100%;height:6px;-webkit-appearance:none;background:var(--lgrey);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--teal);cursor:pointer;border:2px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--soil);padding:24px}
.login-card{background:var(--white);border-radius:16px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-card h2{font-size:22px;font-weight:800;color:var(--soil);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--grey);margin-bottom:24px}
.login-field{display:block;width:100%;padding:12px 14px;border:2px solid var(--lgrey);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;transition:border-color .2s}
.login-field:focus{border-color:var(--teal)}
.login-btn{width:100%;padding:14px;background:var(--teal);color:var(--white);border:none;border-radius:8px;font-size:15px;font-weight:700;margin-top:8px}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.user-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:8px;padding:6px 12px;font-size:11px;color:rgba(255,255,255,.7)}
.user-badge a{color:var(--amber);text-decoration:none;font-size:10px;margin-left:4px}

/* Hint & Help */
.hint-help-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-hint{background:transparent;border:1px solid var(--amber);color:var(--amber);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600}
.btn-help{background:transparent;border:1px solid var(--berry);color:var(--berry);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600}
.hint-box{background:#fff8e8;border:1px solid var(--amber);border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;color:#8B6914;line-height:1.5}
.help-box{background:rgba(139,39,131,.06);border:1px solid var(--berry);border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;color:#6b1a64;line-height:1.5}
.help-tag{display:inline-block;background:var(--berry);color:var(--white);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}

/* Jargon Buster */
.jargon{border-bottom:1.5px dotted var(--amber);cursor:help;position:relative;color:inherit}
.jargon-popup{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--soil);color:var(--white);padding:12px 14px;border-radius:8px;width:280px;font-size:12px;line-height:1.5;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.3);pointer-events:auto}
.jargon-popup::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--soil)}
.jargon-popup.below{bottom:auto;top:calc(100% + 8px)}.jargon-popup.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:var(--soil)}
.jargon-term{color:var(--amber);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}

/* Analogy Box */
.analogy-box{background:#fff8e8;border-left:4px solid var(--amber);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:20px;font-size:13px;color:#6b5a2e;line-height:1.6}
.analogy-box strong{color:#8B6914}

/* Drag and Drop */
.drag-source{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;min-height:40px}
.drag-item{display:inline-block;padding:8px 14px;background:var(--white);border:2px solid var(--teal);border-radius:8px;font-size:12px;font-weight:600;cursor:grab;user-select:none;touch-action:none;transition:all .2s}
.drag-item:active{cursor:grabbing;opacity:.7}
.drag-item.placed{opacity:.4;cursor:default;border-style:dashed}
.drag-item.correct{border-color:var(--teal);background:rgba(42,157,143,.12);cursor:default}
.drag-item.wrong{border-color:var(--red);background:rgba(231,76,60,.1);animation:shake .4s}
.drag-zone{min-height:60px;border:2px dashed var(--lgrey);border-radius:10px;padding:10px;transition:all .2s;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}
.drag-zone.over{border-color:var(--teal);background:rgba(42,157,143,.04)}
.drag-zone-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}

/* Flow Animation */
@keyframes flowAppear{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes drawLine{from{width:0}to{width:100%}}

/* Intro Landing */
.intro-wrap{min-height:100vh;background:var(--soil);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 24px;text-align:center;overflow:hidden}
.intro-badge{display:inline-block;background:rgba(42,157,143,.15);border:1px solid rgba(42,157,143,.3);color:var(--teal);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 16px;border-radius:20px;margin-bottom:24px}
.intro-hero{color:var(--white);font-size:clamp(28px,5vw,48px);font-weight:800;line-height:1.15;margin-bottom:16px;max-width:700px}
.intro-hero em{font-style:normal;color:var(--amber)}
.intro-sub{color:rgba(255,255,255,.6);font-size:clamp(14px,2.5vw,18px);line-height:1.6;max-width:600px;margin-bottom:32px}
.intro-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:640px;width:100%;margin-bottom:40px}
@media(max-width:500px){.intro-stats{grid-template-columns:1fr;gap:12px}}
.intro-stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px 16px}
.intro-stat .num{font-size:clamp(28px,4vw,40px);font-weight:800;line-height:1}
.intro-stat .label{font-size:11px;color:rgba(255,255,255,.5);margin-top:6px;line-height:1.4}
.intro-cta{background:var(--teal);color:var(--white);border:none;border-radius:12px;padding:18px 36px;font-size:clamp(15px,2.5vw,18px);font-weight:700;letter-spacing:-.3px;box-shadow:0 4px 24px rgba(42,157,143,.4);transition:all .3s}
.intro-cta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(42,157,143,.5)}
.intro-footer{color:rgba(255,255,255,.3);font-size:11px;margin-top:32px}

/* Chat UI */
.chat-wrap{background:var(--white);border:2px solid var(--lgrey);border-radius:12px;overflow:hidden;margin:20px 0}
.chat-header{background:var(--soil);padding:12px 16px;display:flex;align-items:center;gap:10px}
.chat-header .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
.chat-messages{height:320px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:var(--teal);color:var(--white);border-bottom-right-radius:4px}
.chat-msg.assistant{align-self:flex-start;background:var(--parch);color:var(--soil);border-bottom-left-radius:4px}
.chat-msg.typing{align-self:flex-start;background:var(--parch);color:var(--grey);font-style:italic}
.chat-input-row{display:flex;border-top:1px solid var(--lgrey);padding:8px}
.chat-input{flex:1;border:none;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;background:transparent}
.chat-send{background:var(--teal);color:var(--white);border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;flex-shrink:0}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:600px){.chat-messages{height:260px}}

/* Role Selector */
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.role-grid{grid-template-columns:repeat(2,1fr)}}
.role-card{background:var(--white);border:2px solid var(--lgrey);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--teal)}
.role-card.active{border-color:var(--teal);background:rgba(42,157,143,.06)}
.role-card .role-icon{font-size:24px;margin-bottom:6px}
.role-card .role-name{font-size:12px;font-weight:700;color:var(--soil)}

/* 7-point wheel */
.wheel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:600px){.wheel-grid{grid-template-columns:repeat(2,1fr)}}
.wheel-point{border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.wheel-point:hover{transform:translateY(-2px)}
.wheel-point.active{border-color:var(--white);transform:translateY(-2px)}
.wheel-point .wp-num{font-size:20px;font-weight:800;opacity:.5;margin-bottom:4px}
.wheel-point .wp-title{font-size:11px;font-weight:700;line-height:1.3}

/* Enhanced mobile */
@media(max-width:600px){
  .drag-source{gap:6px}
  .drag-item{padding:6px 10px;font-size:11px}
  .drag-zone{min-height:50px;padding:8px}
  .intro-hero{font-size:28px}
  .site-header .logo-text h1{font-size:16px}
  .study-header .title{font-size:11px}
  .section-nav{gap:6px}
  .section-btn{padding:4px 10px;font-size:11px}
  .quiz-q{font-size:12px}
  .quiz-opt{padding:8px 12px;font-size:11px}
  .analogy-box{font-size:12px;padding:10px 12px}
  .jargon-popup{width:220px;font-size:11px}
}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes celebratePulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;width:12px;height:12px;border-radius:2px;animation:confettiFall linear forwards}
.celebrate-text{animation:celebratePulse 1s ease infinite}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── COLOUR PALETTE ────────────────────────────────────────────
const C={soil:"#1c1510",teal:"#2a9d8f",tealDk:"#1f7268",berry:"#8B2783",lime:"#9FB04F",amber:"#e9a84c",cream:"#faf7f2",parch:"#f5f0e8",white:"#ffffff",grey:"#6b7280",lgrey:"#e5e7eb",red:"#e74c3c"};

// ─── GLOSSARY (Jargon Buster) ─────────────────────────────────
const glossary={
  "predictive model":"A mathematical tool that learns patterns from existing data and uses them to make predictions about new, unseen data.",
  "coefficient":"A number that tells you how much one variable influences the prediction. Bigger coefficient = stronger influence.",
  "intercept":"The baseline starting value in a model \u2014 what the prediction would be if all inputs were zero.",
  "residual":"The gap between what the model predicted and what was actually observed. Smaller residuals = better model.",
  "correlation":"A number from \u22121 to +1 measuring how strongly two things move together. Zero means no relationship.",
  "causation":"When one thing directly makes another happen \u2014 stronger than correlation, which only shows association.",
  "regression":"A method that draws the best-fitting line (or curve) through data points to make predictions.",
  "overfitting":"When a model memorises the training data so well that it fails on new data. Like revising answers rather than understanding.",
  "supervised learning":"Teaching a model by showing it labelled examples: here are the inputs AND the correct answers.",
  "unsupervised learning":"Finding hidden patterns in data without knowing the right answers in advance.",
  "cross-validation":"Testing a model by rotating which portion of data it trains on vs validates against, so every data point gets tested.",
  "random effect":"A statistical adjustment that accounts for natural variation between groups (e.g. different farms have different baselines).",
  "fixed effect":"The main finding \u2014 the average effect of a variable across all groups in the study.",
  "p-value":"The probability of seeing your result by chance if there were truly no effect. Below 0.05 is typically considered significant.",
  "GLMM":"Generalised Linear Mixed Model \u2014 a statistical model that handles both non-normal data and grouped/nested observations.",
  "XGBoost":"Extreme Gradient Boosting \u2014 a powerful machine learning algorithm that builds hundreds of small decision trees in sequence.",
  "SHAP":"SHapley Additive exPlanations \u2014 a method to explain exactly how much each input contributed to a specific prediction.",
  "feature importance":"A measure of how much each input variable contributes to the model\u2019s predictions overall.",
  "AUC":"Area Under the Curve \u2014 measures how well a model can distinguish between two categories. 1.0 is perfect, 0.5 is random guessing.",
  "ROC curve":"Receiver Operating Characteristic curve \u2014 a graph showing the trade-off between catching true positives and avoiding false alarms.",
  "PCA":"Principal Component Analysis \u2014 a technique that compresses many correlated measurements into fewer independent ones.",
  "CLR transformation":"Centred Log-Ratio transformation \u2014 converts percentage-based data (like microbial abundances) into a form suitable for standard statistics.",
  "alpha diversity":"How many different species exist within a single sample and how evenly they are distributed.",
  "beta diversity":"How different the species communities are between two separate samples or sites.",
  "metabolomics":"The science of measuring all the small chemical molecules (metabolites) in a food or biological sample.",
  "dummy encoding":"Converting a category label (like \u2018no-till\u2019) into a set of binary 0/1 columns that a model can work with.",
  "class imbalance":"When one category in your data vastly outnumbers another, making it hard for the model to learn the rare category.",
  "R-squared":"The proportion of variation in the outcome that the model explains. R\u00b2 = 0.80 means 80% of variation is accounted for.",
  "RMSE":"Root Mean Squared Error \u2014 average prediction error that penalises large mistakes more heavily.",
  "MAE":"Mean Absolute Error \u2014 the average prediction error in the same units as the measurement.",
  "precision":"Of all the items the model flagged as positive, what proportion actually were positive.",
  "recall":"Of all the actual positives, what proportion did the model successfully catch.",
  "confusion matrix":"A 2\u00d72 table showing correct and incorrect predictions: true positives, false positives, true negatives, false negatives.",
  "confidence score":"A probability (0\u2013100%) expressing how certain the model is about its prediction.",
  "data drift":"When real-world data gradually changes over time, causing a model trained on old data to become less accurate.",
  "pre-registration":"Publicly declaring your research hypotheses and methods before collecting data, to prevent unconscious bias.",
  "biomarker":"A measurable biological indicator \u2014 a substance or characteristic that signals a specific condition or process.",
  "mean":"The average \u2014 add up all the values and divide by how many there are.",
  "range":"The gap between the smallest and largest values in a dataset."
};

// Sort glossary terms longest-first to prevent partial matches
const glossaryTerms=Object.keys(glossary).sort((a,b)=>b.length-a.length);

function applyJargon(text){
  const used=new Set();
  let result=text;
  for(const term of glossaryTerms){
    if(used.has(term))continue;
    const re=new RegExp(`\\b(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})\\b`,'i');
    const match=result.match(re);
    if(match){
      result=result.replace(re,`<span class="jargon" data-term="${term}">${match[1]}</span>`);
      used.add(term);
    }
  }
  return result;
}

function attachJargonHandlers(container){
  if(!container)return;
  container.querySelectorAll('.jargon').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.jargon-popup').forEach(p=>p.remove());
      const term=el.dataset.term;
      const def=glossary[term];
      if(!def)return;
      const popup=document.createElement('div');
      popup.className='jargon-popup';
      popup.innerHTML=`<span class="jargon-term">${term}</span>${def}`;
      el.appendChild(popup);
      // Flip below if near top of viewport
      const rect=popup.getBoundingClientRect();
      if(rect.top<10){popup.classList.add('below')}
    });
  });
  document.addEventListener('click',()=>document.querySelectorAll('.jargon-popup').forEach(p=>p.remove()),{once:false});
}

function renderCorrelation(el){
  let strength=0.8;

    const n=30;
    const pts=Array.from({length:n},(_,i)=>{
      const x=rand(i,1.7)*80+10;

      return{x,y:Math.max(5,Math.min(95,y))};

    const label=strength>0.7?"Strong Positive":strength>0.3?"Moderate Positive":strength>-0.3?"Weak / No Relationship":strength>-0.7?"Moderate Negative":"Strong Negative";

          ].map(r=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid ${C.lgrey}"><div style="width:14px;height:14px;border-radius:3px;background:${r.col};margin-top:2px;flex-shrink:0"></div><div><div style="font-size:12px;font-weight:700;color:${C.soil}">${r.label}</div><div style="font-size:11px;color:${C.grey}">${r.desc}</div></div></div>`).join("")}
        </div>`;
    } else {
      const foldColors=(round,fold)=>fold===round?{bg:"#fff3cd",border:C.amber,label:"VALIDATE"}:{bg:"#e8f7f4",border:C.teal,label:"TRAIN"};
      el.innerHTML=`
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="pill" data-mode="standard" style="background:transparent;color:${C.teal};border-color:${C.teal}">Standard Split</button>
          <button class="pill active" data-mode="kfold" style="background:${C.berry};color:${C.white};border-color:${C.berry}">K-Fold Cross-Validation</button>
        </div>
        <div style="background:${C.white};border-radius:10px;padding:16px">
          <div style="font-size:12px;color:${C.grey};margin-bottom:10px">With only 30 farms, k-fold uses ALL data for both training and validation by rotating which group is tested:</div>
          <div style="display:flex;gap:6px;margin-bottom:12px;justify-content:center">
            ${[0,1,2,3,4].map(i=>`<button data-round="${i}" style="background:${kRound===i?C.soil:"transparent"};color:${kRound===i?C.white:C.soil};border:1px solid ${C.soil};border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600">Round ${i+1}</button>`).join("")}
          </div>
          <div style="display:flex;gap:6px;justify-content:center;margin-bottom:12px">
            ${[0,1,2,3,4].map(fold=>{const{bg,border,label}=foldColors(kRound,fold);return`<div style="flex:1;background:${bg};border:2px solid ${border};border-radius:6px;padding:8px;text-align:center"><div style="font-size:10px;font-weight:700;color:${border}">Fold ${fold+1}</div><div style="font-size:9px;color:${border};margin-top:2px">${label}</div></div>`}).join("")}
          </div>
          <div style="background:${C.teal}10;border-radius:6px;padding:10px;font-size:11px;color:${C.tealDk}">
            Round ${kRound+1}: Fold ${kRound+1} is the validation set. The other 4 folds train the model. After all 5 rounds, every farm has been validated exactly once. Average the 5 performance scores for a reliable estimate.
          </div>
        </div>`;
      el.querySelectorAll('[data-round]').forEach(btn=>btn.addEventListener('click',()=>{kRound=+btn.dataset.round;draw()}));
    }
    el.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{showKfold=btn.dataset.mode==="kfold";draw()}));
  }
  draw();
}

function renderComposition(el){
  let vals=[35,30,25,10];
  const labels=["Bacteria A","Bacteria B","Bacteria C","Other"];
  const colors=[C.teal,C.berry,C.lime,C.amber];
  function draw(){
    const total=vals.reduce((a,b)=>a+b,0);
    let cumAngle=0;
    const slices=vals.map((v,i)=>{
      const angle=(v/total)*360;const start=cumAngle;cumAngle+=angle;
      const r=60,cx=80,cy=80;
      const startRad=start*Math.PI/180,endRad=(start+angle)*Math.PI/180;
      const x1=cx+r*Math.sin(startRad),y1=cy-r*Math.cos(startRad);
      const x2=cx+r*Math.sin(endRad),y2=cy-r*Math.cos(endRad);
      const large=angle>180?1:0;
      return{d:`M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${large},1,${x2.toFixed(1)},${y2.toFixed(1)}Z`,col:colors[i],pct:((v/total)*100).toFixed(0)};
    });
    el.innerHTML=`
      <div class="visual-title">Compositional Data \u2014 The Problem with Microbiome Data</div>
      <div class="visual-desc">Microbial abundance is always relative (sums to 100%). Drag the sliders \u2014 notice how changing one species forces others to change too.</div>
      <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
        <svg width="160" height="160" viewBox="0 0 160 160">${slices.map(s=>`<path d="${s.d}" fill="${s.col}" stroke="${C.white}" stroke-width="2"/>`).join("")}</svg>
        <div style="flex:1">${vals.map((v,i)=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:${C.soil};display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;background:${colors[i]};border-radius:2px;display:inline-block"></span>${labels[i]}</span><span style="font-size:11px;font-weight:700;color:${colors[i]}">${((v/total)*100).toFixed(0)}%</span></div><input type="range" min="1" max="60" value="${v}" data-idx="${i}" style="accent-color:${colors[i]}"></div>`).join("")}</div>
      </div>
      <div style="background:#fff0f0;border-radius:6px;padding:10px;font-size:11px;color:#c0392b;margin-top:8px"><strong>The problem:</strong> Standard correlation analyses assume variables are independent. But if Bacteria A increases, the others MUST decrease \u2014 they share the 100% total. CLR transformation corrects for this before modelling.</div>`;
    el.querySelectorAll('input[data-idx]').forEach(inp=>inp.addEventListener('input',e=>{vals[+e.target.dataset.idx]=+e.target.value;draw()}));
  }
  draw();
}

function renderConfusionMatrix(el){
  let threshold=0.5;
  function draw(){
    const tp=Math.round(28*threshold/.5),fp=Math.round(8*(1-threshold/.5)),fn=Math.round(7*(threshold/.5)),tn=Math.round(32*(1-threshold*.3));
    const precision=tp/(tp+Math.max(fp,1)),recall=tp/(tp+Math.max(fn,1)),f1=2*precision*recall/(precision+recall||1);
    el.innerHTML=`
      <div class="visual-title">Confusion Matrix \u2014 Classifying High vs Low Nutrient Farms</div>
      <div class="grid-2" style="align-items:start">
        <div>
          <div style="font-size:11px;color:${C.grey};margin-bottom:12px">Classification threshold: <strong style="color:${C.teal}">${threshold.toFixed(2)}</strong></div>
          <input type="range" min="30" max="90" step="5" value="${Math.round(threshold*100)}" id="cm-slider" style="margin-bottom:16px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px">
            ${[{val:tp,label:"True Positives",sub:"Correctly flagged as HIGH",col:C.teal,bg:C.teal+"20"},{val:fp,label:"False Positives",sub:"Incorrectly flagged as HIGH",col:C.red,bg:"#fde8e8"},{val:fn,label:"False Negatives",sub:"Missed HIGH farms",col:"#f39c12",bg:"#fff3cd"},{val:tn,label:"True Negatives",sub:"Correctly flagged as LOW",col:C.tealDk,bg:C.lime+"25"}].map(c=>`<div style="background:${c.bg};border:2px solid ${c.col};border-radius:6px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:${c.col}">${c.val}</div><div style="color:${c.col};font-weight:700">${c.label}</div><div style="color:${C.grey};font-size:10px">${c.sub}</div></div>`).join("")}
          </div>
        </div>

function renderErrorMetrics(el){
  const farms=[{id:"Farm 1",actual:5.2,predicted:5.1},{id:"Farm 2",actual:3.8,predicted:4.6},{id:"Farm 3",actual:6.1,predicted:5.9},{id:"Farm 4",actual:2.9,predicted:4.2},{id:"Farm 5",actual:4.7,predicted:4.8},{id:"Farm 6",actual:5.5,predicted:5.3}];
  const errors=farms.map(f=>({...f,err:f.predicted-f.actual,absErr:Math.abs(f.predicted-f.actual)}));
  const mae=(errors.reduce((a,b)=>a+b.absErr,0)/errors.length).toFixed(2);
  const rmse=Math.sqrt(errors.reduce((a,b)=>a+b.err**2,0)/errors.length).toFixed(2);
  el.innerHTML=`
    <div class="visual-title">MAE (Mean Absolute Error) vs RMSE (Root Mean Squared Error) \u2014 Why Both Matter</div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr style="background:${C.parch}">${["Farm","Actual Iron","Predicted","Error","|Error|","Error\u00b2"].map(h=>`<th style="border-bottom:2px solid ${C.teal}">${h}</th>`).join("")}</tr></thead>
        <tbody>${errors.map((r,i)=>`<tr><td style="font-weight:600">${r.id}</td><td>${r.actual}</td><td>${r.predicted}</td><td style="color:${r.err>0?C.berry:C.teal};font-weight:600">${r.err>0?"+":""}${r.err.toFixed(1)}</td><td style="color:${C.amber};font-weight:600">${r.absErr.toFixed(1)}</td><td style="color:${Math.abs(r.err)>.8?C.red:C.grey};font-weight:${Math.abs(r.err)>.8?700:400}">${(r.err**2).toFixed(2)}</td></tr>`).join("")}</tbody>
      </table>
    </div>
    <div class="grid-2" style="margin-top:12px">
      <div style="background:${C.teal}10;border:1px solid ${C.teal};border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:${C.grey}">Mean Absolute Error</div><div style="font-size:28px;font-weight:800;color:${C.teal}">${mae}</div><div style="font-size:10px;color:${C.grey}">mg/100g \u2014 treats all errors equally</div></div>
      <div style="background:#fff3cd;border:1px solid #f39c12;border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:${C.grey}">Root Mean Squared Error</div><div style="font-size:28px;font-weight:800;color:#f39c12">${rmse}</div><div style="font-size:10px;color:${C.grey}">mg/100g \u2014 penalises big errors more</div></div>
    </div>`;
}

function renderDragDrop(el){
  const items=[
    {text:"Soil pH: 6.7",type:"number"},{text:"Iron: 4.8 mg/100g",type:"number"},{text:"Nitrogen: 120 kg/ha",type:"number"},
    {text:"Tillage: no-till",type:"category"},{text:"Crop: wheat",type:"category"},{text:"Grazing: rotational",type:"category"},
    {text:"Cover crop: yes",type:"yesno"},{text:"Organic certified: no",type:"yesno"}
  ];
  const zones=[
    {id:"number",label:"Number (Continuous)",col:C.teal,desc:"Values measured on a scale"},
    {id:"category",label:"Category (Named groups)",col:C.berry,desc:"Labels with no numeric order"},
    {id:"yesno",label:"Yes / No (Binary)",col:C.amber,desc:"Only two possible values"}
  ];
  const placed={},feedback={};
  let score=0,total=items.length;
  function draw(){
    const unplaced=items.filter((_,i)=>!placed[i]);
    score=Object.keys(placed).filter(i=>feedback[i]==="correct").length;
    el.innerHTML=`
      <div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:4px">Drag Each Measurement to Its Type</div>
      <div style="font-size:11px;color:${C.grey};margin-bottom:12px">Drag (or tap) each item, then drop it in the correct box. Score: <strong style="color:${C.teal}">${score}/${total}</strong></div>
      <div class="drag-source" id="drag-src">
        ${unplaced.map((item,j)=>{const idx=items.indexOf(item);return`<div class="drag-item" draggable="true" data-idx="${idx}" data-type="${item.type}">${item.text}</div>`}).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${zones.map(z=>`
          <div>
            <div class="drag-zone-label" style="color:${z.col}">${z.label}</div>
            <div class="drag-zone" data-zone="${z.id}" style="border-color:${z.col}40">
              ${Object.keys(placed).filter(i=>placed[i]===z.id).map(i=>`<div class="drag-item ${feedback[i]||""}" style="cursor:default;border-color:${feedback[i]==="correct"?C.teal:feedback[i]==="wrong"?C.red:z.col}">${items[i].text}</div>`).join("")}
            </div>
            <div style="font-size:10px;color:${C.grey};margin-top:4px">${z.desc}</div>
          </div>`).join("")}
      </div>
      ${score===total?`<div style="background:${C.teal}10;border:2px solid ${C.teal};border-radius:8px;padding:14px;margin-top:14px;text-align:center"><div style="font-size:20px;margin-bottom:4px">\ud83c\udf89</div><div style="font-weight:700;color:${C.teal};font-size:14px">All correct! You can tell data types apart.</div><button id="drag-reset" style="background:${C.teal};color:${C.white};border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;margin-top:8px">Try Again</button></div>`:""}`;
    // Drag events (desktop)
    el.querySelectorAll('.drag-item[draggable]').forEach(item=>{
      item.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',item.dataset.idx)});
    });
    el.querySelectorAll('.drag-zone').forEach(zone=>{
      zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over')});
      zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
      zone.addEventListener('drop',e=>{
        e.preventDefault();zone.classList.remove('over');
        const idx=e.dataTransfer.getData('text/plain');
        handleDrop(idx,zone.dataset.zone);
      });
    });
    // Touch events (mobile)
    let touchIdx=null;
    el.querySelectorAll('.drag-item[draggable]').forEach(item=>{
      item.addEventListener('touchstart',e=>{touchIdx=item.dataset.idx;item.style.opacity='0.5'},{passive:true});
    });
    el.querySelectorAll('.drag-zone').forEach(zone=>{
      zone.addEventListener('touchend',e=>{
        if(touchIdx!==null){handleDrop(touchIdx,zone.dataset.zone);touchIdx=null}
      });
    });
    // Also handle tap-to-select then tap-zone pattern
    document.getElementById('drag-reset')?.addEventListener('click',()=>{Object.keys(placed).forEach(k=>{delete placed[k];delete feedback[k]});draw()});
  }
  function handleDrop(idx,zoneId){
    placed[idx]=zoneId;
    feedback[idx]=items[idx].type===zoneId?"correct":"wrong";
    if(feedback[idx]==="wrong"){setTimeout(()=>{delete placed[idx];delete feedback[idx];draw()},800)}
    draw();
  }
  draw();
}

function renderGuessAndCheck(el){
  const target=4.8;
  const guesses=[8.0,5.5,4.2,4.9,4.78,4.81,4.80];
  let step=0,timer=null;
  function animate(){timer=setInterval(()=>{if(step<guesses.length-1){step++;draw()}else{clearInterval(timer);timer=null}},1200)}
  function draw(){
    const current=guesses[step];
    const error=Math.abs(current-target);
    el.innerHTML=`
      <div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:4px">How a Computer Learns \u2014 Guess, Check, Adjust</div>
      <div style="font-size:11px;color:${C.grey};margin-bottom:14px">The computer tries to guess the iron content of a farm. Watch it get closer with each attempt.</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;flex-wrap:wrap">
        <div style="text-align:center">
          <div style="font-size:10px;color:${C.grey};margin-bottom:4px">COMPUTER\u2019S GUESS</div>
          <div style="font-size:36px;font-weight:800;color:${C.teal}">${current.toFixed(2)}</div>
        </div>
        <div style="font-size:24px;color:${C.lgrey}">vs</div>
        <div style="text-align:center">
          <div style="font-size:10px;color:${C.grey};margin-bottom:4px">ACTUAL VALUE</div>
          <div style="font-size:36px;font-weight:800;color:${step>=guesses.length-1?C.amber:C.lgrey}">${step>=guesses.length-1?target.toFixed(2):"????"}</div>
        </div>
      </div>
      <div style="font-size:11px;color:${C.grey};margin-bottom:8px">Error shrinking over ${guesses.length} attempts:</div>
      <div style="display:flex;gap:4px;align-items:flex-end;height:60px;margin-bottom:12px">
        ${guesses.slice(0,step+1).map((g,i)=>{const e=Math.abs(g-target);const h=Math.max(2,e/3.5*55);return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:8px;color:${C.soil};font-weight:700">${e.toFixed(2)}</div><div style="width:100%;background:${i===step&&step>=guesses.length-1?C.teal:C.amber};border-radius:3px 3px 0 0;height:${h}px;transition:height .4s"></div><div style="font-size:8px;color:${C.grey}">#${i+1}</div></div>`}).join("")}
      </div>
      ${step>=guesses.length-1?`<div style="background:${C.teal}10;border:2px solid ${C.teal};border-radius:8px;padding:12px;text-align:center"><div style="font-size:16px;margin-bottom:4px">\ud83c\udf89</div><div style="font-weight:700;color:${C.teal};font-size:13px">The computer learned!</div><div style="font-size:11px;color:${C.grey};margin-top:4px">Error dropped from ${Math.abs(guesses[0]-target).toFixed(1)} down to ${Math.abs(guesses[guesses.length-1]-target).toFixed(2)}. This \u201cguess-check-adjust\u201d cycle is the foundation of all machine learning.</div></div>`:`<div style="font-size:11px;color:${C.amber};text-align:center">Attempt ${step+1} of ${guesses.length} \u2014 error: ${error.toFixed(2)}</div>`}
      <div style="text-align:center;margin-top:10px"><button id="gc-replay" style="background:${C.teal};color:${C.white};border:none;border-radius:6px;padding:5px 14px;font-size:11px;font-weight:600">\u25b6 ${step>=guesses.length-1?"Replay":"Playing..."}</button></div>`;
    document.getElementById('gc-replay')?.addEventListener('click',()=>{clearInterval(timer);step=0;draw();setTimeout(animate,300)});
  }
  draw();animate();
}

function renderYouAreTheModel(el){
  const farms=[
    {som:1.5,actual:3.2,model:3.4},{som:3.0,actual:4.5,model:4.6},{som:4.2,actual:5.1,model:5.3},

            <div style="font-size:28px;font-weight:800;color:${C.teal}">${userTotal.toFixed(1)}</div>

            <div style="font-size:28px;font-weight:800;color:${C.amber}">${modelTotal.toFixed(1)}</div>
          </div>
        </div>
        ${results.map((r,i)=>`<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid ${C.lgrey};font-size:12px"><div style="width:80px;color:${C.grey}">SOM: ${farms[i].som}%</div><div style="width:60px">Actual: <strong>${farms[i].actual}</strong></div><div style="flex:1;color:${C.teal}">You: ${r.userGuess.toFixed(1)} (err ${r.userErr.toFixed(1)})</div><div style="flex:1;color:${C.amber}">Model: ${farms[i].model} (err ${r.modelErr.toFixed(1)})</div></div>`).join("")}
        <div style="background:${C.teal}10;border-radius:6px;padding:10px;margin-top:12px;font-size:12px;color:${C.tealDk}"><strong>Key takeaway:</strong> The model uses patterns from hundreds of data points to make predictions. With practice (more data), it gets better \u2014 just like you\u2019d improve with more experience.</div>
        <div style="text-align:center;margin-top:10px"><button id="ym-reset" style="background:${C.teal};color:${C.white};border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600">Try Again</button></div>`;
      document.getElementById('ym-reset')?.addEventListener('click',()=>{current=0;results=[];locked=false;userGuess=4.5;draw()});
      return;
    }
    const farm=farms[current];
    el.innerHTML=`
      <div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:4px">You Are the Model \u2014 Farm ${current+1} of ${farms.length}</div>
      <div style="font-size:11px;color:${C.grey};margin-bottom:14px">Based on the soil organic matter %, guess the iron content.</div>
      <div style="background:${C.soil};border-radius:10px;padding:16px;text-align:center;margin-bottom:14px">
        <div style="color:rgba(255,255,255,.5);font-size:10px;letter-spacing:1px;margin-bottom:4px">SOIL ORGANIC MATTER</div>
        <div style="color:${C.amber};font-size:36px;font-weight:800">${farm.som}%</div>
        <div style="color:rgba(255,255,255,.4);font-size:11px;margin-top:4px">Higher organic matter is generally associated with higher iron</div>
      </div>
      <div style="text-align:center;margin-bottom:8px">
        <div style="font-size:11px;color:${C.grey};margin-bottom:4px">Your guess for iron content (mg/100g):</div>
        <div style="font-size:28px;font-weight:800;color:${C.teal}">${userGuess.toFixed(1)}</div>
      </div>
      <input type="range" min="20" max="80" step="1" value="${Math.round(userGuess*10)}" ${locked?"disabled":""} id="ym-slider" style="margin-bottom:10px;accent-color:${C.teal}">
      ${!locked?`<div style="text-align:center"><button id="ym-lock" style="background:${C.teal};color:${C.white};border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700">Submit Guess</button></div>`:""}
      ${locked?`
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">
          <div style="background:${C.teal}10;border-radius:6px;padding:10px;text-align:center"><div style="font-size:10px;color:${C.grey}">YOUR GUESS</div><div style="font-size:20px;font-weight:800;color:${C.teal}">${userGuess.toFixed(1)}</div></div>
          <div style="background:${C.lime}10;border-radius:6px;padding:10px;text-align:center"><div style="font-size:10px;color:${C.grey}">ACTUAL</div><div style="font-size:20px;font-weight:800;color:${C.lime}">${farm.actual}</div></div>
          <div style="background:${C.amber}10;border-radius:6px;padding:10px;text-align:center"><div style="font-size:10px;color:${C.grey}">MODEL</div><div style="font-size:20px;font-weight:800;color:${C.amber}">${farm.model}</div></div>
        </div>
        <div style="text-align:center;margin-top:12px"><button id="ym-next" style="background:${C.teal};color:${C.white};border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700">${current<farms.length-1?"Next Farm \u2192":"See Scorecard \u2192"}</button></div>
      `:""}`;
    document.getElementById('ym-slider')?.addEventListener('input',e=>{userGuess=+e.target.value/10;draw()});
    document.getElementById('ym-lock')?.addEventListener('click',()=>{
      locked=true;
      results.push({userGuess,userErr:Math.abs(userGuess-farm.actual),modelErr:Math.abs(farm.model-farm.actual)});
      draw();
    });
    document.getElementById('ym-next')?.addEventListener('click',()=>{current++;locked=false;userGuess=4.5;draw()});
  }
  draw();
}

  draw();
}

function renderPulseChat(el){
  let messages=[{role:"assistant",content:"Hello! I\u2019m Vitagri \u2014 Pulse \u2014 your AI guide to nutrient-dense agriculture. I\u2019ve been trained on the Vitagri & Bionutrient Institute white paper, the GroundUp Framework, and 3,000+ peer-reviewed studies.\n\nTell me your role (farmer, scientist, agronomist, food business, policy maker, or health professional) and I\u2019ll help you build a personalised action plan for your next steps."}];
  let sending=false;
  function draw(){
    el.innerHTML=`
      <div style="font-weight:700;color:${C.soil};font-size:13px;margin-bottom:4px">Vitagri \u2014 Pulse AI \u2014 Your Personalised Toolkit</div>
      <div style="font-size:11px;color:${C.grey};margin-bottom:12px">Ask questions, explore ideas, and build your action plan. Powered by Claude AI, grounded in Vitagri\u2019s research.</div>
      <div class="chat-wrap">
        <div class="chat-header"><div class="dot"></div><span style="color:${C.white};font-size:12px;font-weight:600">Vitagri \u2014 Pulse AI</span><span style="color:rgba(255,255,255,.4);font-size:10px;margin-left:auto">Powered by Claude</span></div>
        <div class="chat-messages" id="pulse-messages">
          ${messages.map(m=>`<div class="chat-msg ${m.role}">${m.content.replace(/\n/g,'<br>')}</div>`).join("")}
          ${sending?'<div class="chat-msg typing">Thinking\u2026</div>':""}
        </div>
        <div class="chat-input-row">
          <input type="text" class="chat-input" id="pulse-input" placeholder="Ask me anything about nutrient-dense agriculture\u2026" ${sending?"disabled":""}>
          <button class="chat-send" id="pulse-send" ${sending?"disabled":""}>Send</button>
        </div>
      </div>
      <div style="text-align:center;margin-top:12px">
        <a href="https://vitagri.org/pulse" target="_blank" rel="noopener" style="display:inline-block;background:${C.soil};color:${C.amber};text-decoration:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700">Open full Vitagri Pulse \u2192</a>
      </div>`;
    const msgArea=document.getElementById('pulse-messages');
    if(msgArea)msgArea.scrollTop=msgArea.scrollHeight;
    const input=document.getElementById('pulse-input');
    const sendBtn=document.getElementById('pulse-send');
    async function send(){
      const text=input?.value?.trim();
      if(!text||sending)return;
      messages.push({role:"user",content:text});
      sending=true;draw();
      try{
        const resp=await fetch('/.netlify/functions/pulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:messages.slice(0,-1)})});
        const data=await resp.json();
        messages.push({role:"assistant",content:data.response||"Sorry, I couldn\u2019t process that. Please try again."});
      }catch(e){messages.push({role:"assistant",content:"I\u2019m currently unavailable. Please try the full Vitagri Pulse at vitagri.org/pulse."});}
      sending=false;draw();
    }
    sendBtn?.addEventListener('click',send);
    input?.addEventListener('keydown',e=>{if(e.key==='Enter')send()});
    input?.focus();
  }
  draw();
}
