const modules=[
  {id:0,title:"Foundations \u2014 Before You Begin",icon:"\ud83e\uddf1",sections:[
    {heading:"What Is Data and Why Does It Matter?",visual:"dataflow",
     analogy:"Think of data like ingredients in a recipe. The ingredients (farm measurements) go in, the recipe (model) processes them, and out comes the dish (prediction). Better ingredients = better dish.",
     body:"Everything in this course starts with food. The data analysis system is purely to enable efficient and affordable ways to help the farming and food industry measure and reward food production that is nutritionally enhancing. Using real, measurable information collected from farms. Data is not opinions or guesses. It is numbers written down in a structured way: the pH of a soil sample, the iron content of a wheat grain, and whether a farm uses cover crops or not. The goal of a predictive model is to reduce the costs of monitoring how to produce nutritious food. This cost reduction is the result of the industry working together with structured information and finding patterns in outcomes that can be efficiently replicated. The animation above shows the journey: farming practices are measured, samples are analysed in laboratories, the results are converted into numbers, and finally, a model uses those numbers to make a prediction about food nutrition. Our goal is for the farming industry to be rewarded for this nutrition."},
    {heading:"Hands-on: Sort the Data Types",visual:"dragdrop",bodyFirst:true,
     body:"Not all data is the same. Some measurements are numbers on a scale (like soil pH at 6.7), some are named categories (like tillage method: no-till, min-till, or conventional), and some are simple yes/no answers (like whether cover crops are used). Drag each measurement above into the correct box. Getting this right matters because the model treats each type differently \u2014 numbers can be added and averaged, but categories cannot."},
    {heading:"Reading Numbers \u2014 Averages, Ranges, and Patterns",visual:"dotplot",
     analogy:"Imagine measuring the height of 30 people in a room. Most would cluster around average height, with a few very tall and very short people at the edges. Farm iron content works the same way.",
     body:"When you have 30 measurements, you need to summarise them. The most important summary is the average (or mean) \u2014 add up all the values and divide by how many there are. The range tells you the gap between the smallest and largest values. Watch the animation above: as each farm\u2019s iron content appears on the number line, notice how most values cluster near the middle with fewer at the extremes. This pattern is the foundation of statistics."},
    {heading:"Hands-on: Guess the Average",visual:"guessavg",bodyFirst:true,
     body:"Now it\u2019s your turn. You know 30 farms measured iron content from 3.1 to 6.5 mg/100g. Use the slider above to guess where the average falls, then lock in your answer to see how close you were. This exercise builds your intuition for what \u2018typical\u2019 looks like in a dataset \u2014 a skill that matters throughout this course."},
    {heading:"How Machines Learn \u2014 The Simplest Possible Explanation",visual:"guesscheck",
     analogy:"Learning to throw darts at a target. Your first throw misses by a lot. You adjust, throw again, miss by less. After many throws, you\u2019re hitting close to the centre. That\u2019s exactly how a machine learning model works.",
     body:"This is called \u2018machine learning\u2019, its prediction is not magic. Essentially, it is about finding logical patterns in a lot of information. Think of it like predicting the weather: you look up and see clouds, and, to you, the past has taught you that this pattern of clouds likely means it\u2019s a weather change. This is the same. It follows a simple loop: guess, check how wrong the guess was, adjust the guess to be less wrong, and repeat. The animation above shows this in action \u2014 the computer starts with a rough guess (8.0), discovers it\u2019s too high, adjusts downward, checks again, adjusts again, and gradually converges on the correct answer (4.8). This \u201cguess-check-adjust\u201d cycle \u2014 done millions of times across thousands of data points \u2014 is the core of every machine learning algorithm you will encounter in this course."},
    {heading:"Hands-on: You Are the Model",visual:"youmodel",bodyFirst:true,
     body:"Time to put yourself in the model\u2019s shoes. You\u2019ll see 5 farms, each with a soil organic matter percentage. Your job is to guess the iron content based on that number alone. After each guess, you\u2019ll see the actual value AND what the trained model predicted. At the end, compare your total error to the model\u2019s. Don\u2019t worry about being accurate \u2014 the point is to feel what prediction is like, and to see how a model trained on hundreds of examples outperforms a human guessing from limited information."},
  ],quiz:[
    {q:"What is \u2018data\u2019 in the context of this course?",options:["Opinions from farmers about their land","Organised, structured measurements collected from farms","Social media posts about agriculture","Government policy documents"],correct:1,hint:"Data is factual and measurable \u2014 not opinions or stories.",explanation:"Data in this course means organised, structured measurements: numbers like soil pH, categories like tillage method, and binary facts like whether cover crops are used. It is collected systematically from farms and laboratories, not from opinions or anecdotes."},
    {q:"A soil sample with pH 6.7 is an example of what type of data?",options:["A category \u2014 it\u2019s a label","A yes/no value","A number (continuous value) \u2014 it sits on a scale","An opinion from the farmer"],correct:2,hint:"pH is measured on a numeric scale from 0 to 14. Where does 6.7 sit?",explanation:"pH 6.7 is a continuous numeric value \u2014 it sits on a scale and can take any value. It is not a category (like \u2018no-till\u2019), not a yes/no, and not an opinion. Understanding this distinction is essential because the model handles numbers, categories, and binary values differently."},
    {q:"30 farms have iron values ranging from 3.1 to 6.5 mg/100g. The range is:",options:["6.5 mg/100g","3.1 mg/100g","3.4 mg/100g","9.6 mg/100g"],correct:2,hint:"Range = largest value minus smallest value.",explanation:"Range = 6.5 \u2212 3.1 = 3.4 mg/100g. The range tells you how spread out the values are. A small range means farms are similar; a large range means there is a wide variation in iron content across farms."},
    {q:"How does a machine learning model improve its predictions?",options:["It asks a human expert for the right answer each time","It uses a guess-check-adjust cycle, reducing errors with each iteration","It randomly generates answers until one is correct","It copies answers from a textbook database"],correct:1,hint:"Think about the dart-throwing analogy \u2014 miss, adjust, throw again, get closer.",explanation:"Machine learning follows a guess-check-adjust cycle. The model makes a prediction, measures how wrong it was (the error), adjusts its internal settings to reduce that error, and repeats. Over many iterations, the errors shrink and predictions improve. This is fundamentally different from looking up answers or asking experts."},
    {q:"Why does good data quality matter more than a clever model?",options:["Because models cannot process large amounts of data","Because wrong or missing measurements lead to wrong predictions \u2014 garbage in, garbage out","Because data is more expensive than models","Because regulators require it"],correct:1,hint:"If the measurements going into the model are wrong, what happens to the predictions coming out?",explanation:"The principle of \u2018garbage in, garbage out\u2019 means that no model, however sophisticated, can produce reliable predictions from unreliable data. If soil pH is recorded incorrectly, or nitrogen rates are missing, the model learns wrong patterns. Data quality is the foundation everything else builds upon."},
  ]},
  {id:1,title:"What Is a Predictive Model?",icon:"\ud83c\udfaf",sections:[
    {heading:"Inputs, Outputs and Predictions",visual:"bidir",dark:true,
     analogy:"Like a recipe calculator: you enter ingredients (farming data) and it tells you what the dish will taste like (nutrient density). The clever part is it works for recipes it has never seen before.",
     body:"A predictive model is a mathematical function that takes measurable inputs and produces a numerical output. For Vitagri, the forward model takes farming practice data \u2014 tillage method, nitrogen rate, soil organic matter, cover crop use \u2014 and outputs a predicted nutrient density value (e.g. iron content in mg per 100g of food). The key distinction from a lookup table is that the model generalises: it can predict nutrient density for a farm it has never seen before, based on the patterns learned from the farms it has. Toggle between Forward and Reverse above to see both directions."},
    {heading:"The Simple Linear Model",visual:"inline1",
     body:"Real Vitagri & Bionutrient Institute models use dozens of inputs simultaneously, but the underlying logic is the same: each input variable gets a coefficient (a weight) that expresses how strongly it influences the prediction. The model learns these coefficients from training data by finding values that minimise prediction errors across all farms."},
    {heading:"Why Vitagri & Bionutrient Institute Needs Two Models",visual:"inline2",
     analogy:"Like a teacher who both sets the exam (forward model: what should good food look like?) and marks the papers (reverse model: does this food actually come from the farm that claims it?).",
     body:"Together, the two models create a closed verification loop: the forward model predicts which farms should produce nutrient-dense food based on their practices, while the reverse model checks whether the food from those farms actually carries the biological signatures of those farming practices. This bidirectional validation is what makes Vitagri & Bionutrient Institute\u2019s certification audit-grade rather than self-reported."},
  ],quiz:[
    {q:"What does a predictive model do with inputs it has NEVER seen before?",options:["Returns an error message","Looks up the answer in a database","Generalises from learned patterns to make a prediction","Asks the farmer to provide historical data"],correct:2,hint:"Think about how a model differs from a simple lookup table.",explanation:"A predictive model generalises from patterns learned during training. Unlike a database lookup, it can produce predictions for entirely new inputs by applying the mathematical relationships it has discovered."},
    {q:"In the equation: Iron = 1.12 \u00d7 SOM + 12.5, what does 1.12 represent?",options:["The average iron content of all farms","How much iron increases per 1% rise in soil organic matter","The maximum possible iron content","The intercept of the model"],correct:1,hint:"The number multiplying SOM is called a coefficient \u2014 what does it tell you about the relationship?",explanation:"The coefficient 1.12 means that for every 1 percentage point increase in soil organic matter, the model predicts iron content rises by 1.12 mg/100g. It quantifies the strength and direction of the relationship."},
    {q:"What is the MAIN purpose of Vitagri & Bionutrient Institute's reverse model?",options:["To predict crop yield from weather data","To infer farming practices from food biomarkers \u2014 verification","To replace the forward model when data is missing","To train the XGBoost algorithm"],correct:1,hint:"The reverse model works backwards \u2014 from the food to the farm. Why would you want to do that?",explanation:"The reverse model takes biological markers from a food sample and infers what farming system produced it. This enables independent verification of farming practice claims \u2014 a food\u2019s biology cannot easily be faked."},
    {q:"A farm has soil organic matter of 5%. Using: Iron = 1.12 \u00d7 SOM + 12.5, what is the predicted iron?",options:["18.1 mg/100g","17.6 mg/100g","12.5 mg/100g","5.6 mg/100g"],correct:0,hint:"Substitute 5 into the equation: 1.12 \u00d7 5 + 12.5 = ?",explanation:"Iron = 1.12 \u00d7 5 + 12.5 = 5.6 + 12.5 = 18.1 mg/100g. You multiply the coefficient by the input value and add the intercept."},
    {q:"Which best describes what makes Vitagri & Bionutrient Institute's certification 'audit-grade'?",options:["It uses a very large dataset","It is reviewed by a government body","The forward and reverse models together create a closed verification loop","It only uses organic farms"],correct:2,hint:"Think about what happens when two models check each other\u2019s work.",explanation:"The forward model predicts food quality from farming practices, while the reverse model verifies those practice claims from the food\u2019s biology. Together they create a closed loop where each direction validates the other \u2014 making the system far harder to game than either model alone."},
  ]},
  {id:2,title:"The Data We Work With",icon:"\ud83d\udcca",sections:[
    {heading:"Types of Variables in the Vitagri & Bionutrient Institute Dataset",visual:"vartypes",
     analogy:"Variables are like different types of containers: a measuring jug holds numbers (continuous), labelled boxes hold categories, and a light switch is either on or off (binary).",
     body:"Before building any model, you must understand your data types \u2014 because different types require different statistical treatments. Click each variable type above to explore examples from the Vitagri & Bionutrient Institute dataset. Continuous variables can be used directly in most models. Binary variables need encoding as 0/1. Categorical variables need \u2018dummy encoding\u2019 \u2014 splitting into multiple binary columns. Ordinal variables can sometimes be treated as continuous if the gaps between levels are approximately equal."},
    {heading:"The Four Data Streams",visual:"streams",
     body:"Vitagri & Bionutrient Institute\u2019s model is powered by four distinct data streams collected from each farm. Farming practices are the most actionable \u2014 these are the levers farmers can pull. Soil health data provides the biological mechanism linking practices to food quality. Microbial profiles capture the invisible ecosystem that mediates nutrient cycling. Metabolomics \u2014 the chemical fingerprint of the food itself \u2014 provides the ground truth against which all predictions are validated."},
    {heading:"Data Quality \u2014 Garbage In, Garbage Out",visual:"inline3",
     body:"Every real dataset has problems. Professional data scientists spend 50\u201380% of their time on data cleaning and quality assurance \u2014 not building models. Vitagri & Bionutrient Institute\u2019s data collection protocol is designed to minimise issues at source (standardised survey instruments, automated range checks, duplicate entry for critical measurements) but post-collection cleaning remains essential before any model is fitted."},
  ],quiz:[
    {q:"Tillage method (no-till / min-till / conventional) is what type of variable?",options:["Continuous","Binary","Categorical","Ordinal"],correct:2,hint:"How many named groups does tillage have? Is there a natural numeric order?",explanation:"Tillage method has three named categories with no inherent numeric order \u2014 you cannot say conventional is \u2018more\u2019 than no-till in a meaningful numeric sense. This makes it categorical, requiring dummy encoding before use in models."},
    {q:"Which data stream provides the 'ground truth' nutrient measurement?",options:["Farming practices","Soil health data","Microbial profiles","Metabolomics"],correct:3,hint:"Which stream directly measures what is in the food itself?",explanation:"Metabolomics is the chemical analysis of the food \u2014 it directly measures nutrient and metabolite concentrations. The other streams measure the farming environment. Metabolomics provides the ground truth outcome that all predictions are validated against."},
    {q:"Farm 8 records soil pH as 13.1. What is the most appropriate first response?",options:["Accept it \u2014 unusual farms exist","Delete the farm from the dataset","Flag for manual review \u2014 likely a data entry error","Replace with the mean pH"],correct:2,hint:"What is the realistic range of soil pH in UK agriculture?",explanation:"UK agricultural soils rarely exceed pH 8.5. A reading of 13.1 is almost certainly a data entry error (perhaps 6.31 or 1.31). The correct response is to flag it for manual review \u2014 not to silently delete or replace it, as the true value may be recoverable."},
    {q:"You have 28 conventional farms and only 2 organic farms. This is called:",options:["Missing data","Class imbalance","An outlier","A random effect"],correct:1,hint:"When one category vastly outnumbers another in your training data, the model struggles to learn the minority class.",explanation:"Class imbalance occurs when the categories in your target variable are unevenly represented. With 28:2, the model may simply predict \u2018conventional\u2019 for everything and still appear 93% accurate. Techniques like SMOTE oversampling or class-weighted loss functions help address this."},
    {q:"What does 'dummy encoding' do to a categorical variable?",options:["Converts it to a decimal number","Splits it into multiple binary (0/1) columns","Removes it from the analysis","Calculates its correlation"],correct:1,hint:"Models need numbers, not text labels. How do you represent three tillage types numerically?",explanation:"Dummy encoding creates a separate binary (0/1) column for each category. Tillage with three levels becomes two columns: \u2018is_min_till\u2019 and \u2018is_conventional\u2019 (no-till is the reference when both are 0). This lets the model treat each category independently."},
  ]},
  {id:3,title:"Statistics Foundations",icon:"\ud83d\udcd0",sections:[
    {heading:"Distributions \u2014 What Does Your Data Look Like?",visual:"bell",
     body:"Before choosing a statistical model, you need to understand the distribution of your outcome variable. Iron content across farms typically follows a roughly normal distribution \u2014 most farms cluster around the average, with fewer at the extremes. However, some nutrient variables (like specific polyphenols) are right-skewed. Skewed distributions often need log-transformation before modelling."},
    {heading:"Correlation \u2014 How Variables Relate",visual:"corr",
     analogy:"Umbrellas and rain: when you see lots of umbrellas, it\u2019s probably raining. Umbrellas don\u2019t cause rain \u2014 they\u2019re associated. Correlation measures the strength of these associations.",
     body:"Correlation (Pearson r) measures the strength and direction of the linear relationship between two continuous variables. Drag the slider to explore what different correlation strengths look like visually. Critical warning: correlation does not equal causation. Soil organic matter is correlated with iron, but the mechanism involves complex microbial processes \u2014 not a direct chemical pathway."},
    {heading:"Regression \u2014 The Foundation of Prediction",visual:"regression",
     analogy:"Drawing the best straight line through scattered dots on a dartboard using a ruler. The line won\u2019t pass through every dot, but it captures the overall direction.",
     body:"Regression finds the line (or surface in multiple dimensions) that best fits the observed data points. \u2018Best fit\u2019 means minimising the sum of squared residuals \u2014 the vertical distances between each data point and the line. Toggle the residuals button above to see these errors."},
  ],quiz:[
    {q:"A right-skewed distribution of polyphenol values means:",options:["Most farms have very high polyphenols","Most farms have low polyphenols, with a few very high outliers","The data is normally distributed","The model cannot be applied"],correct:1,hint:"In a right-skewed distribution, the long tail extends to the right (high values).",explanation:"Right-skewed means the bulk of observations cluster at lower values, with a long tail stretching towards high values. Most farms have modest polyphenol levels, but a few (likely low-input organic) produce exceptionally high concentrations, pulling the tail rightward."},
    {q:"A correlation of r = \u22120.78 between synthetic nitrogen and iron content means:",options:["Applying more nitrogen directly destroys iron","There is a strong positive relationship","Higher nitrogen rates are strongly associated with lower iron content","There is no meaningful relationship"],correct:2,hint:"The sign tells you the direction, the magnitude tells you the strength. r = \u22120.78 is close to \u22121.",explanation:"r = \u22120.78 indicates a strong negative association: as synthetic nitrogen increases, iron content tends to decrease substantially. However, correlation does not prove causation \u2014 it shows the association is strong and consistent, not that nitrogen directly destroys iron."},
    {q:"What are 'residuals' in a regression model?",options:["The variables excluded from the model","The difference between predicted and actual values","The coefficients assigned to each predictor","The training farms not used for fitting"],correct:1,hint:"Residuals measure how far off the model\u2019s predictions are from reality.",explanation:"A residual is the vertical distance between an observed data point and the regression line\u2019s prediction for that point. Residual = actual value \u2212 predicted value. Good models have small, randomly distributed residuals with no systematic pattern."},
    {q:"Correlation does not equal causation. Which example best illustrates this?",options:["Soil pH and iron have r=0.12","Cover crops correlate with high nutrients \u2014 but specific farms may choose to use cover crops AND have better soil history","Nitrogen and iron have r=\u22120.45 \u2014 proving nitrogen causes iron deficiency","Organic matter has r=+0.72 \u2014 proving it directly creates iron"],correct:1,hint:"Look for a confounding variable \u2014 a hidden third factor that could explain both the practice and the outcome.",explanation:"Specific farms that choose to use cover crops may also have invested in better soil management over decades. The correlation between cover crops and nutrients might partly reflect broader management philosophy and soil history rather than cover crops alone. This confounding variable makes causal claims from observational data unreliable without controlled experiments."},
    {q:"What does minimising 'sum of squared residuals' achieve?",options:["It removes outliers","It ensures all variables are used","It finds the line that best fits the data points","It standardises all variables"],correct:2,hint:"The regression line is positioned to make the total squared prediction error as small as possible.",explanation:"Ordinary least squares regression finds the line (or hyperplane) that minimises the sum of squared differences between predictions and actual values. Squaring ensures positive and negative errors don\u2019t cancel out, and penalises large errors more than small ones."},
  ]},
  {id:4,title:"Introduction to Machine Learning",icon:"\ud83e\udd16",sections:[
    {heading:"Supervised vs Unsupervised Learning",visual:"inline4",
     body:"Vitagri & Bionutrient Institute\u2019s core predictive model is supervised \u2014 we have labelled data (farms with known nutrient measurements). Unsupervised methods appear in the preprocessing pipeline, particularly PCA for metabolomics data reduction. Supervised models make predictions on new data; unsupervised models reveal structure in existing data."},
    {heading:"Train, Validate and Test \u2014 Never Cheat",visual:"split",
     analogy:"Practice papers, a mock exam, and the real exam. You learn from practice (training), check yourself with the mock (validation), and prove yourself in the real exam (test). Peeking at the real exam beforehand would invalidate the result.",
     body:"The single most important rule in machine learning: never evaluate your model on the same data it was trained on. With only 30 farms, this requires careful management. The test set is sacred: it is only used at the very end, once, to report final performance. Peeking at it during development invalidates your results."},
    {heading:"Overfitting and Feature Scaling",visual:"overfit",
     analogy:"A student who memorises every answer word-for-word from the revision guide but cannot answer a question phrased differently. They learned the specific words, not the underlying concept.",
     body:"Overfitting occurs when a model learns the training data so thoroughly that it memorises noise rather than genuine patterns. With 30 farms and potentially 50+ variables, overfitting is a major risk. Solutions include regularisation, cross-validation, and feature selection."},
  ],quiz:[
    {q:"Vitagri & Bionutrient Institute's forward model (practices \u2192 nutrient prediction) is an example of:",options:["Unsupervised learning","Reinforcement learning","Supervised learning","Transfer learning"],correct:2,hint:"Does Vitagri & Bionutrient Institute provide labelled examples (input + correct answer) during training?",explanation:"Supervised learning uses labelled data where both inputs (farming practices) and correct outputs (measured nutrients) are known. The model learns the mapping between them. Unsupervised learning has no labels \u2014 it only discovers hidden structure."},
    {q:"Why is the test set only used ONCE?",options:["It takes too long otherwise","Using it multiple times would cause overfitting to the test set itself","It must be reserved for GLMM not XGBoost","Government regulations require this"],correct:1,hint:"If you keep checking your answers against the test set and adjusting, is it still a fair test?",explanation:"If you repeatedly evaluate on the test set and tweak your model based on the results, you are effectively training on the test set. It ceases to be an independent measure of real-world performance. The test set must remain untouched until the final evaluation to give an honest estimate."},
    {q:"K-fold cross-validation with 5 folds on 30 farms means:",options:["Each fold trains on 5 farms and validates on 25","Each round validates on 6 farms while training on the other 24","The test set is split into 5 equal parts","The model is trained 5 times on the full dataset"],correct:1,hint:"30 farms \u00f7 5 folds = how many farms per fold? One fold validates, the rest train.",explanation:"With 5 folds and 30 farms, each fold contains 6 farms. In each round, one fold (6 farms) is held out for validation while the remaining 24 train the model. After 5 rounds, every farm has been validated exactly once. The average of all 5 scores gives a robust performance estimate."},
    {q:"A model achieves R\u00b2=0.98 on training but R\u00b2=0.54 on validation. This is:",options:["Excellent generalisation","Normal variance","Underfitting","Overfitting"],correct:3,hint:"Look at the gap between training and validation performance. A huge gap means the model learned something specific to the training data.",explanation:"The enormous gap (0.98 vs 0.54) is the classic signature of overfitting. The model has memorised the training data\u2019s quirks rather than learning generalisable patterns. It performs brilliantly on data it has seen but poorly on new farms."},
    {q:"Feature scaling is needed because:",options:["It improves interpretability","Variables in different units would otherwise have unequal influence based purely on scale","The GLMM requires it mathematically","Scaling reduces trees needed"],correct:1,hint:"Nitrogen is measured in hundreds of kg/ha while pH is measured in single digits. Which would dominate a distance calculation?",explanation:"Without scaling, variables measured in large units (e.g. nitrogen at 0\u2013200 kg/ha) would dominate algorithms that use distances or gradients, simply because their numeric range is larger \u2014 not because they are more important. Scaling to a common range (e.g. 0\u20131 or z-scores) ensures fair treatment."},
  ]},
  {id:5,title:"Generalised Linear Mixed Models (GLMM)",icon:"\ud83d\udcc9",sections:[
    {heading:"Building from Regression to GLMM",visual:"inline5",
     body:"The GLMM is not a completely different algorithm from regression \u2014 it is an extension that adds two capabilities: (1) handling non-normal distributions via a link function g(), and (2) handling clustered/nested data via random effects. For Vitagri & Bionutrient Institute, we use a Gaussian GLMM for continuous outcomes like iron content."},
    {heading:"Fixed Effects vs Random Effects",visual:"glmm",
     analogy:"In sport, the rules are the same for every team (fixed effects), but each team performs differently at home vs away (random effects). The rules are what you report; the home-ground advantage is what you account for.",
     body:"Fixed effects are the main findings: the average effect of cover crops, organic matter, and nitrogen rate across all farms. Random effects account for the fact that farms are the sampling unit, not individual soil samples. Ignoring this structure would inflate false positives and underestimate uncertainty."},
    {heading:"Reading GLMM Output",visual:"output",
     body:"The model output table is your primary scientific report. Each row represents one fixed effect. The estimate tells you the direction and magnitude. The p-value tells you the probability of seeing an effect this large by chance if the true effect were zero."},
  ],quiz:[
    {q:"Why can't Vitagri use standard multiple regression?",options:["Regression requires too many computers","Multiple samples from the same farm are correlated \u2014 not independent","Regression only works with binary outcomes","The dataset has too many continuous variables"],correct:1,hint:"Multiple soil samples come from the same field. Are they truly independent observations?",explanation:"Standard regression assumes every observation is independent. But Vitagri takes multiple samples per farm, and samples from the same farm share soil, climate, and management history \u2014 they are correlated. GLMM handles this by adding a random effect for each farm, properly accounting for the nested structure."},
    {q:"In a GLMM, what does the 'random effect' for each farm represent?",options:["A random sample of that farm's data","The farm's average nutrient density","Everything about that farm not captured by measured variables","The probability the farm is organic"],correct:2,hint:"Fixed effects capture the measured variables. What captures the unmeasured farm-specific differences?",explanation:"The random effect for each farm captures all the unexplained, farm-specific variation that the measured fixed effects (tillage, nitrogen, etc.) cannot account for \u2014 things like unique microclimate, drainage, field history, and management nuances that are not in the dataset."},
    {q:"A fixed effect of +1.24 for 'Cover crop (yes)' means:",options:["Cover crops are used on 1.24% of farms","Farms with cover crops have 1.24 mg/100g more iron on average","Cover crop use increases yield by 1.24 tonnes","The p-value for cover crops is 1.24"],correct:1,hint:"Fixed effect estimates tell you the average change in the outcome associated with that variable.",explanation:"The estimate +1.24 means that, on average across all farms in the study, farms using cover crops are predicted to have 1.24 mg/100g more iron than farms without cover crops, after controlling for all other variables in the model."},
    {q:"A GLMM shows p = 0.527 for soil pH. The best interpretation is:",options:["Soil pH definitely has no effect","This dataset does not provide sufficient evidence that pH affects iron","Soil pH increases iron by 52.7%","We should remove pH from all future models"],correct:1,hint:"A high p-value means the observed effect could easily have arisen by chance. But absence of evidence is not evidence of absence.",explanation:"p = 0.527 means there is a 52.7% probability of seeing an effect this large by chance if pH truly had no effect. This is far above the 0.05 threshold \u2014 so we cannot claim pH affects iron. However, with only 30 farms we may lack the statistical power to detect a real but small effect. It does not prove pH is irrelevant."},
    {q:"AIC is used in model selection. AIC = 312 vs AIC = 341 \u2014 which is better?",options:["312 \u2014 lower AIC indicates better trade-off between fit and complexity","341 \u2014 larger numbers indicate better fit","They are equally good","More information is needed"],correct:0,hint:"AIC penalises both poor fit and excessive complexity. Think of it like a golf score.",explanation:"Lower AIC is better. AIC balances model fit (how well it explains the data) against complexity (how many parameters it uses). A model with AIC 312 achieves a better trade-off than one with 341 \u2014 it explains the data well without unnecessary complexity."},
  ]},
  {id:6,title:"Gradient Boosting & XGBoost",icon:"\u26a1",sections:[
    {heading:"Decision Trees \u2014 The Building Block",visual:"dtree",
     body:"A single decision tree divides farms into groups by asking a series of yes/no questions about their farming variables. The result is interpretable \u2014 you can follow any path from root to leaf and explain the prediction. However, a single tree is fragile: small changes in training data can produce very different trees."},
    {heading:"From Trees to Gradient Boosting",visual:"boosting",
     analogy:"A team of editors reviewing a document. The first editor fixes the big errors. The second editor catches what the first missed. The third fixes finer details. After 300 editors, the document is polished.",
     body:"Gradient boosting builds trees sequentially. Tree 1 makes a rough prediction. Tree 2 focuses exclusively on correcting Tree 1\u2019s largest errors. XGBoost implements this with regularisation, parallel processing, and sophisticated handling of missing values."},
    {heading:"Feature Importance and SHAP (SHapley Additive exPlanations) Values",visual:"shap",
     body:"SHAP values give a theoretically grounded, consistent measure of each feature\u2019s contribution to each individual prediction. For Vitagri & Bionutrient Institute, SHAP values allow us to tell a farmer exactly why their farm scored as it did. This per-farm explainability is essential for farmer trust and scientific credibility."},
  ],quiz:[
    {q:"In a decision tree, what determines where each split is made?",options:["Random chance","The variable and threshold that best separates outcomes","The farmer's preference","The order variables appear in the dataset"],correct:1,hint:"At each node, the algorithm tests every possible variable and threshold to find the one that creates the most homogeneous groups.",explanation:"The algorithm evaluates all possible splits across all variables and selects the one that best separates high-nutrient from low-nutrient farms (measured by information gain or Gini impurity). The process is entirely data-driven, not random."},
    {q:"How does gradient boosting differ from a single tree?",options:["It uses larger datasets","It only works for classification","It builds trees sequentially, each correcting previous errors","It is less accurate but faster"],correct:2,hint:"Each new tree in the sequence focuses on the mistakes the previous trees made.",explanation:"Gradient boosting builds trees one after another. Tree 1 makes rough predictions. Tree 2 is trained on Tree 1\u2019s errors (residuals). Tree 3 corrects what Tree 2 missed, and so on. The final prediction is the sum of all trees \u2014 far more accurate and stable than any single tree."},
    {q:"SHAP values allow Vitagri to:",options:["Speed up training","Explain to each farmer exactly why their score is what it is","Replace the GLMM entirely","Reduce the number of variables needed"],correct:1,hint:"SHAP decomposes each individual prediction into the contribution of each input variable.",explanation:"SHAP (SHapley Additive exPlanations) assigns each input variable a contribution to each individual prediction. Vitagri can tell a farmer: \u2018Your iron score is above average because of your high SOM (+1.2) and cover crops (+0.6), partially offset by your nitrogen rate (\u22120.4).\u2019 This transparency builds trust."},
    {q:"XGBoost includes regularisation to:",options:["Speed up computation","Prevent overfitting by penalising complexity","Improve data collection","Handle missing values"],correct:1,hint:"With 30 farms and many variables, an unconstrained model would memorise the training data. What prevents that?",explanation:"Regularisation adds a penalty term that discourages overly complex models. L1 (alpha) encourages sparse feature selection; L2 (lambda) shrinks coefficients towards zero. This prevents the model from memorising training data noise, especially critical with only 30 farms."},
    {q:"SOM has SHAP importance 0.28, nitrogen rate 0.10. This means:",options:["SOM should be removed","Nitrogen rate has no effect","SOM contributes 2.8\u00d7 more to predictions","The model is overfitting to SOM"],correct:2,hint:"SHAP importance is proportional \u2014 compare the two numbers as a ratio.",explanation:"SHAP importance of 0.28 vs 0.10 means soil organic matter contributes 2.8 times more to the model\u2019s predictions than nitrogen rate (0.28 \u00f7 0.10 = 2.8). Both variables matter, but SOM is the dominant driver of nutrient density predictions in this model."},
  ]},
  {id:7,title:"Metabolomics & Microbial Data",icon:"\ud83e\udda0",sections:[
    {heading:"The Curse of Dimensionality \u2014 800 Metabolites, 30 Farms",visual:"pca",
     analogy:"Finding a lost key in a room is easy. In a building, harder. In a city, near impossible. More dimensions = exponentially more space to search. PCA shrinks the city back down to a room.",
     body:"With only 30 farms, fitting a model with 800 predictors is statistically disastrous. PCA (Principal Component Analysis) solves this by finding the directions of maximum variation and projecting all samples onto a small number of principal components \u2014 800 measurements compressed into 15 components that capture 87% of the biological variation."},
    {heading:"Compositional Data \u2014 The Microbiome Problem",visual:"comp",
     analogy:"Imagine a pie chart with 4 slices that must always total 100%. If you make one slice bigger, the others must shrink \u2014 even if nothing actually changed about them. That\u2019s the compositional data problem.",
     body:"Microbial community data comes as relative abundances that sum to 100%. This creates spurious negative correlations. The solution is CLR (Centred Log-Ratio) transformation, which converts relative abundances into log-ratios relative to the geometric mean. After CLR, standard methods are valid."},
    {heading:"Diversity Metrics \u2014 Alpha and Beta Diversity",visual:"inline6",
     body:"Alpha diversity is a key predictor variable in Vitagri & Bionutrient Institute\u2019s model: farms with higher microbial diversity consistently show stronger nutrient density profiles. Beta diversity is used for clustering and identifying farm groupings."},
  ],quiz:[
    {q:"Why can't Vitagri use all 800 metabolite peaks directly?",options:["Equipment cannot measure 800 peaks","With 30 farms and 800 variables, the model would severely overfit","Metabolites are not related to farming","The GLMM cannot handle more than 50 variables"],correct:1,hint:"Compare the number of variables (800) to the number of observations (30 farms). What happens when variables exceed observations?",explanation:"With 800 variables and only 30 farms, the model has far more parameters than data points. It would find spurious patterns that perfectly fit the training data but fail completely on new farms \u2014 severe overfitting. PCA compresses the 800 into ~15 independent components first."},
    {q:"What does CLR transformation correct for?",options:["Non-normal distribution of soil variables","Spurious correlations from compositional data summing to 100%","Outliers in nitrogen rate","The nested structure of samples"],correct:1,hint:"If all microbial abundances must sum to 100%, what happens mathematically when one species increases?",explanation:"Compositional data (relative abundances summing to 100%) creates artificial negative correlations: if Bacteria A increases, others must decrease to maintain the sum. CLR (Centred Log-Ratio) transformation removes this constraint by converting to log-ratios relative to the geometric mean, allowing valid statistical analysis."},
    {q:"A farm has Shannon alpha diversity = 3.9 vs another with 1.1. This indicates:",options:["3.9\u00d7 more bacteria","Much more diverse and evenly distributed community","Poor soil health","Shannon index is not relevant"],correct:1,hint:"Shannon index accounts for both the number of species and how evenly they are distributed.",explanation:"A Shannon index of 3.9 indicates a highly diverse community with many species present in relatively even proportions. A score of 1.1 suggests dominance by a few species. Higher microbial diversity is consistently associated with healthier soils and more nutrient-dense food in the literature."},
    {q:"PCA on 800 metabolites producing 15 components captures 87%. What happened to the remaining 13%?",options:["Added to GLMM as correction","Classified as noise and discarded","Stored in components 16\u2013800","Represents farming practice variation"],correct:1,hint:"PCA ranks components by how much variation they explain. The later components capture less and less meaningful signal.",explanation:"The remaining 13% of variance resides in components 16\u2013800, but these capture progressively less information and more noise. By keeping only the first 15 components (87% of variance), we retain the meaningful biological signal while discarding the noise that would cause overfitting."},
    {q:"Bray-Curtis dissimilarity of 0.82 between two farms means:",options:["They share 82% of species","Their microbial communities are very different","Both have high alpha diversity","They are 0.82 km apart"],correct:1,hint:"Bray-Curtis ranges from 0 (identical communities) to 1 (completely different). Where does 0.82 fall?",explanation:"Bray-Curtis dissimilarity of 0.82 (on a 0\u20131 scale) means the two farms share very few microbial species in common \u2014 their communities are 82% different. This is a beta diversity metric comparing composition between sites, not within a single site."},
  ]},
  {id:8,title:"Model Evaluation & Validation",icon:"\u2705",sections:[
    {heading:"Regression Metrics \u2014 How Wrong Are We?",visual:"errors",
     body:"MAE (Mean Absolute Error) gives the average prediction error in the original units. RMSE (Root Mean Squared Error) penalises large errors more heavily. R\u00b2 gives the proportion of variance explained by the model. Vitagri & Bionutrient Institute\u2019s minimum threshold: R\u00b2\u22650.70, RMSE\u22641.0 mg/100g."},
    {heading:"Classification Metrics \u2014 The Confusion Matrix",visual:"cm",
     analogy:"Like a medical test: a \u2018positive\u2019 result might be correct (true positive) or a false alarm (false positive). A \u2018negative\u2019 might be correct (true negative) or a missed case (false negative). The same logic applies to certifying farms.",
     body:"When Vitagri & Bionutrient Institute makes a binary decision \u2014 \u2018certify\u2019 or \u2018do not certify\u2019 \u2014 the confusion matrix becomes essential. Drag the threshold slider to see the precision-recall trade-off. The F1 score balances both."},
    {heading:"ROC (Receiver Operating Characteristic) Curves and Model Calibration",visual:"roc",
     body:"The ROC (Receiver Operating Characteristic) curve plots the trade-off between true positive rate and false positive rate across ALL possible thresholds. AUC (Area Under the Curve) = 0.91 means in 91% of randomly selected pairs, the model correctly scores the high-nutrient farm higher. Calibration \u2014 whether probability scores mean what they claim \u2014 is equally important."},
  ],quiz:[
    {q:"MAE = 0.4, RMSE = 1.1. What does the larger RMSE suggest?",options:["The model has more variables","A few farms have very large prediction errors","RMSE is always larger by a fixed amount","The model is underfitting"],correct:1,hint:"RMSE squares errors before averaging, so large errors are amplified. If RMSE is much bigger than MAE, what does that tell you?",explanation:"MAE treats all errors equally, but RMSE squares them first \u2014 so a few large errors disproportionately inflate RMSE. The big gap (0.4 vs 1.1) means most predictions are close, but a small number of farms have very large errors pulling the RMSE up."},
    {q:"Reducing the classification threshold from 0.7 to 0.3 will generally:",options:["Increase both precision and recall","Increase recall but reduce precision","Reduce recall but increase precision","Have no effect"],correct:1,hint:"A lower threshold means more farms are classified as \u2018positive\u2019. You catch more true positives, but also more false ones.",explanation:"Lowering the threshold means more farms exceed it and get classified as \u2018high nutrient\u2019. This catches more genuine high-nutrient farms (higher recall) but also incorrectly includes more low-nutrient farms (lower precision). This is the precision-recall trade-off."},
    {q:"AUC of 0.91 means:",options:["91% of all farms correctly classified","In 91% of high-vs-low pairs, the model correctly ranks them","91% precision","9% false positive rate"],correct:1,hint:"AUC measures discriminative ability across all thresholds. Think of it as a ranking test.",explanation:"AUC = 0.91 means that if you randomly pick one high-nutrient farm and one low-nutrient farm, the model correctly assigns a higher score to the high-nutrient farm 91% of the time. It measures the model\u2019s ability to rank farms correctly, independent of any specific threshold."},
    {q:"R\u00b2 = 0.78 means:",options:["78% of farms accurately certified","The model explains 78% of variation in iron content","78% of variables are significant","Errors of 0.78 mg/100g on average"],correct:1,hint:"R\u00b2 is the proportion of variance in the outcome variable that the model accounts for.",explanation:"R\u00b2 = 0.78 means the model explains 78% of the farm-to-farm variation in iron content. The remaining 22% is unexplained \u2014 due to variables not in the model, measurement noise, or genuine randomness. For complex biological systems, R\u00b2 > 0.70 is considered strong."},
    {q:"Model calibration refers to:",options:["Setting the optimal threshold","Whether probability scores accurately reflect true probabilities","Comparing against competitors","Removing poor variables"],correct:1,hint:"If a model says \u201880% confident\u2019, how often should it actually be right?",explanation:"Calibration measures whether the model\u2019s probability outputs match real-world frequencies. A well-calibrated model that says \u201880% confident\u2019 should be correct 80% of the time for that group of predictions. Poorly calibrated models may be systematically overconfident or underconfident."},
  ]},
  {id:9,title:"The Bidirectional Architecture",icon:"\ud83d\udd04",sections:[
    {heading:"Full System Architecture",visual:"arch",
     body:"The Vitagri & Bionutrient Institute system architecture consists of three interlocking layers. The data layer collects and preprocesses all four streams. The modelling layer runs both forward and reverse models. The certification layer translates model outputs into confidence scores, audit reports, and financial rewards. Every certification feeds new labelled data back \u2014 this is the continuous learning loop."},
    {heading:"The Reverse Model \u2014 Biological Markers as Fingerprints",visual:"inline7",
     body:"C15:0 and C17:0 fatty acids are synthesised exclusively by bacteria in ruminant digestive systems. They cannot be supplemented into milk or meat \u2014 they are genuinely diagnostic of farming system. These biological constraints make the reverse model fraud-resistant."},
    {heading:"Confidence Scores \u2014 Probability into Decisions",visual:"gauge",
     analogy:"Like a weather forecast: \u201880% chance of rain\u2019 doesn\u2019t mean it will definitely rain, but you\u2019d probably take an umbrella. Confidence scores work the same way \u2014 they guide decisions, not guarantee outcomes.",
     body:"High confidence (\u226580%): issue certification. Borderline (60\u201380%): request additional samples. Low (<60%): certification withheld. All borderline and low scores are flagged for manual expert review."},
  ],quiz:[
    {q:"What makes the continuous learning loop important?",options:["It reduces data collection cost","Each new certified farm adds labelled data that improves future accuracy","It allows the model to run without oversight","It enables offline operation"],correct:1,hint:"What happens to the model as more farms are certified and their data is added to training?",explanation:"Every certified farm generates validated labelled data that can be used to retrain the model. More data means more patterns, better accuracy, and more credible certifications \u2014 which attracts more farms, creating a compounding virtuous cycle."},
    {q:"C15:0 and C17:0 fatty acids are valuable biomarkers because:",options:["They can be tested cheaply","They are produced exclusively during ruminant digestion of living pasture \u2014 cannot be added artificially","They correlate with grain yield","They are the same as omega-3"],correct:1,hint:"Think about why these markers are fraud-resistant. Can a farmer supplement them into their products?",explanation:"C15:0 (pentadecanoic acid) and C17:0 (heptadecanoic acid) are odd-chain fatty acids synthesised exclusively by bacteria in the rumen of grazing animals eating fresh pasture. They cannot be supplemented, injected, or artificially added to meat or dairy \u2014 making them genuinely diagnostic of a pasture-based farming system."},
    {q:"A confidence score of 68% triggers:",options:["Immediate certification","Request for additional samples or revisit next season","Permanent removal from programme","Automatic GLMM retraining"],correct:1,hint:"68% falls in the borderline zone (60\u201380%). What does Vitagri do when it\u2019s not confident enough?",explanation:"A 68% confidence score falls in Vitagri & Bionutrient Institute\u2019s borderline tier (60\u201380%). The evidence is suggestive but not conclusive. The response is to request additional food or soil samples, or revisit in the next growing season to gather more data \u2014 not to certify or reject outright."},
    {q:"The reverse model provides 'fraud-resistant' verification because:",options:["It uses blockchain","Biological markers arise from fundamental pathways that cannot be easily faked","It requires in-person inspection","Reverse models are more accurate"],correct:1,hint:"The markers come from biochemical processes inside animals and soil ecosystems. Can they be manufactured?",explanation:"The biological markers used by the reverse model (odd-chain fatty acids, microbial diversity, polyphenol profiles) arise from fundamental biochemical pathways in living organisms. They cannot be artificially created, supplemented, or faked \u2014 they are the genuine biological fingerprint of the farming system."},
    {q:"The relationship between forward and reverse models is best described as:",options:["Identical algorithms run in opposite directions","Reverse only used when forward fails","Together they create a closed verification loop","Forward is more important for certification"],correct:2,hint:"One model predicts food quality from practices. The other checks practices from food. What do they form together?",explanation:"The forward model predicts nutrient density from farming practices. The reverse model independently verifies those practice claims from the food\u2019s biology. Together they form a closed verification loop \u2014 each direction validates the other, making the certification system far more robust than either model alone."},
  ]},
  {id:10,title:"From Theory to Practice",icon:"\ud83d\ude80",sections:[
    {heading:"The 8-Phase Implementation Pipeline",visual:"pipeline",
     body:"Vitagri & Bionutrient Institute\u2019s implementation follows a disciplined 8-phase pipeline. Click each phase above. The critical discipline is sequential completion \u2014 and pre-registration means publicly declaring hypotheses and methods BEFORE collecting data."},
    {heading:"Scientific Credibility \u2014 Publication Strategy",visual:"inline8",
     body:"Scientific credibility is not just academic \u2014 it is a commercial requirement. Retailers, healthcare organisations, and policy makers will only engage with Vitagri & Bionutrient Institute\u2019s certification if the underlying science is independently verifiable."},
    {heading:"Model Limitations and Honest Communication",visual:"inline9",
     analogy:"Every map has edges. A map of the UK won\u2019t help you navigate Tokyo. Similarly, a model trained on 30 UK farms has boundaries \u2014 it may not work for farms in different countries, climates, or farming systems it has never seen.",
     body:"The Vitagri & Bionutrient Institute model is a decision-support tool, not an oracle. It makes probabilistic predictions based on patterns learned from a finite dataset. The virtuous data cycle is the key mechanism: more farms \u2192 more data \u2192 better model \u2192 more credible certifications \u2192 more farms join."},
  ],quiz:[
    {q:"Why must the analysis plan be pre-registered BEFORE data collection?",options:["Regulatory requirements","To prevent unconscious adjustment of hypotheses after seeing data (p-hacking)","It speeds up peer review","It allows other researchers to contribute"],correct:1,hint:"If you see the data first, you might unconsciously adjust your hypotheses to match what you found.",explanation:"Pre-registration publicly commits you to specific hypotheses and analysis methods before seeing the data. This prevents p-hacking \u2014 the unconscious (or conscious) adjustment of methods after seeing results to produce statistically significant findings. Leading journals now require or strongly encourage pre-registration."},
    {q:"Cover crops are strongly associated with higher iron. The most accurate claim is:",options:["Cover crops cause higher iron","Cover crops are strongly associated with higher iron \u2014 causality would require controlled trials","Farmers using cover crops will definitely produce higher-iron food","The model proves the mechanism"],correct:1,hint:"Observational data shows associations. What type of study would you need for causal proof?",explanation:"Vitagri & Bionutrient Institute\u2019s model is observational \u2014 it identifies strong associations between practices and outcomes but cannot prove causation. Confounding variables (farm wealth, soil history, management skill) may partly explain the relationship. Only randomised controlled trials could establish causality definitively."},
    {q:"The 'virtuous data cycle' means:",options:["Data quality improves automatically","More farms \u2192 more data \u2192 better model \u2192 more credible certifications \u2192 more farms","The model retrains itself without new data","Farmers' data is returned after use"],correct:1,hint:"Think about what happens as the platform grows \u2014 each new farm adds data, which improves the model, which attracts more farms.",explanation:"The virtuous cycle is a compounding feedback loop: each new certified farm adds validated training data, which makes the model more accurate, which makes certifications more credible, which attracts more farms to join \u2014 generating even more data. This is why early data quality investment is so critical."},
    {q:"A novel agroforestry farm scores 42% confidence. The most likely explanation is:",options:["Very poor nutrient density","The model is malfunctioning","The farm type is unlike anything in training data \u2014 insufficient evidence, not failure","Incomplete data collection"],correct:2,hint:"The model was trained on 30 conventional, organic, and mixed farms. Has it ever seen an agroforestry system?",explanation:"A 42% confidence score for a novel farm type most likely reflects insufficient training data for that category. The model has never seen agroforestry \u2014 it lacks examples to learn from. This is a limitation of the training set, not a judgement on the farm\u2019s quality. As more diverse farms join the platform, the model\u2019s coverage improves."},
    {q:"Vitagri & Bionutrient Institute's model is best described as:",options:["A universal oracle for food quality","A decision-support tool with probabilistic predictions and quantified uncertainty","A replacement for laboratory analysis","A regulatory compliance tool"],correct:1,hint:"The model gives probabilities and confidence scores, not definitive answers. What type of tool works that way?",explanation:"Vitagri & Bionutrient Institute\u2019s model is a decision-support tool \u2014 it provides probabilistic predictions with explicit uncertainty quantification (confidence scores). It assists human decision-making rather than replacing it. It complements, not replaces, laboratory analysis and does not claim universal applicability across all regions and farm types."},
  ]},
  {id:12,title:"Inspiration For a Healthier Farming Future",icon:"\ud83c\udf1f",sections:[
    {heading:"The Vision \u2014 Growing Health Together",visual:"groundup",dark:true,
     analogy:"Like building a bridge between two worlds that should never have been separated \u2014 farming and human health. The GroundUp Framework is the blueprint for that bridge.",
     body:"You\u2019ve now completed the technical journey \u2014 from data foundations through GLMM, XGBoost, metabolomics, and the bidirectional architecture. But the technology is not the point. The point is what it makes possible: a world where farming is measured, verified, and rewarded for producing food that genuinely nourishes people. The GroundUp Framework above is Vitagri & Bionutrient Institute\u2019s 7-point plan to make this real. Click each point to explore the targets and timelines. At its heart is a simple principle: Measure what matters, Validate what works, Reward what\u2019s proven. This is not about labels or marketing \u2014 it\u2019s about building the infrastructure so that doing the right thing is commercially rational for every farmer in the system."},
    {heading:"Your Role in the Revolution",visual:"roles",
     body:"The food system is not changed by any single group working alone. It requires farmers willing to measure and share data, scientists willing to publish all results (positive and negative), agronomists bridging the gap between evidence and practice, food businesses willing to pay premiums for verified quality, health professionals connecting diet quality to health outcomes, and policy makers embedding nutrient metrics into public procurement and land management schemes. The role selector above shows specific actions for each group. The critical insight is that every role depends on every other: farmers need markets, markets need evidence, evidence needs data, data needs farmers. This circular dependency is exactly what the GroundUp Framework is designed to catalyse. When the loop is complete, the virtuous cycle begins: more participants generate more data, better models, more credible certifications, and ultimately a food system that rewards nutrition, not just volume."},
    {heading:"Your Personalised Next Steps \u2014 Vitagri \u2014 Pulse AI",visual:"pulse",
     body:"You\u2019ve learned the science. Now it\u2019s time to act. Vitagri \u2014 Pulse is your AI-powered guide, trained on the Vitagri & Bionutrient Institute white paper (covering 3,000+ peer-reviewed studies), the GroundUp Framework, and the predictive model methodology you\u2019ve just studied. Tell Pulse your role, your context, and your questions \u2014 and it will help you build a personalised action plan for your next steps. Whether you\u2019re a farmer wanting to understand what soil health changes would most improve your nutrient density scores, a scientist looking to collaborate on trials, or a food business exploring procurement pathways \u2014 Pulse can help you find your starting point. Growing Health Together starts with one step. Take yours now."},
  ],quiz:[
    {q:"The GroundUp Framework consists of how many interconnected points?",options:["5 points","7 points","10 points","12 points"],correct:1,hint:"Count the points in the interactive wheel above.",explanation:"The GroundUp Framework has 7 interconnected points: Measure What Matters, Reward What Works, Build the Evidence Base, Connect Farm to Fork to Health, Democratise Access, Create Trusted Standards, and Scale Through Collaboration."},
    {q:"What is the core operating principle behind Vitagri & Bionutrient Institute\u2019s approach?",options:["Organic certification for all farms","Measure, Validate, Reward","Maximum crop yield optimisation","Government regulation of food quality"],correct:1,hint:"Three words that describe the entire framework cycle.",explanation:"Measure, Validate, Reward is the core cycle: measure soil health and nutrient density with standardised protocols, validate the link between farming practices and outcomes through rigorous evidence, and reward farmers who produce verified nutrient-dense food through market premiums and recognition."},
    {q:"Why must nutrient-dense food NOT become premium-only?",options:["Because premium products are harder to certify","Because equity demands that the communities most affected by diet-related illness have access","Because farmers prefer mass market pricing","Because premium products require more data"],correct:1,hint:"Think about Point 5 of the GroundUp Framework \u2014 Democratise Access.",explanation:"Point 5 (Democratise Access) explicitly states that affordability and equity must be prioritised. The communities with highest diet-related illness are often those with least access to quality food. If nutrient-dense food becomes premium-only, the framework fails its social mission. 50%+ of procurement pilots must serve universal offerings like school meals and hospital food."},
    {q:"The \u2018virtuous data cycle\u2019 in the GroundUp Framework means:",options:["Data is recycled from old studies","More farms join \u2192 more data \u2192 better models \u2192 more credible certifications \u2192 more farms join","Scientists share data between universities","Government agencies collect farm data centrally"],correct:1,hint:"Each new participant strengthens the system for everyone else.",explanation:"The virtuous cycle is the mechanism that makes the whole framework self-sustaining: each new certified farm adds validated training data, which improves model accuracy, which makes certifications more credible, which attracts more farms. This compounding loop is why early participation is so valuable \u2014 the first farms build the foundation for thousands."},
    {q:"Which statement best captures the philosophy of \u2018Growing Health Together\u2019?",options:["Individual farms should compete to produce the most nutritious food","Durable change happens when every part of the food system \u2014 farmers, scientists, businesses, health professionals, and policy makers \u2014 works together","Technology alone will solve the nutrition crisis","Only organic farming can produce nutrient-dense food"],correct:1,hint:"The word \u2018Together\u2019 in the name is the clue.",explanation:"Growing Health Together recognises that no single group can transform the food system alone. Farmers need markets, markets need evidence, evidence needs data, data needs farmers. The philosophy is collaborative, systems-oriented, and evidence-first \u2014 believing that durable change happens when doing the right thing is commercially rational for everyone in the chain."},
  ]},
];

// ─── INLINE VISUAL RENDERERS (static HTML blocks) ──────────────
function renderInlineVisual(key,el){
  const inlines={
    inline1:()=>`<div style="background:${C.white};border-radius:10px;padding:20px;border:2px solid ${C.teal}">
      <div style="font-weight:700;color:${C.soil};margin-bottom:12px">The Simplest Possible Model</div>

// ─── RENDER ENGINE ─────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(state.view==="intro") renderIntro(app);
  else if(state.view==="login") renderLogin(app);
  else if(state.view==="home") renderHome(app);
  else if(state.view==="study"&&!state.quizMode) renderStudy(app);
  else if(state.view==="study"&&state.quizMode) renderQuiz(app);
}

function renderHome(app){
  const pct=state.completed.length/modules.length*100;
  app.innerHTML=`
    <div class="site-header"><div class="container">
      <div class="logo"><div class="logo-icon">\ud83c\udf31</div><div class="logo-text"><h1>Vitagri & Bionutrient Institute</h1><p>Predictive Model Learning System</p></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <div class="subtitle" style="margin-bottom:0">12 modules from foundations to expert \u2014 complete each quiz at 80%+ to unlock the next</div>
        ${state.user?`<div class="user-badge">\ud83d\udc64 ${state.user.firstName} ${state.user.lastName}<a href="#" id="logout">Log out</a></div>`:""}
      </div>
      <div class="progress-box"><div class="progress-row"><span class="progress-label">Overall Progress</span><span class="progress-count">${state.completed.length}/${modules.length} modules</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    </div></div>
    <div class="container"><div class="module-grid" id="module-grid"></div></div>`;
  document.getElementById('logout')?.addEventListener('click',e=>{e.preventDefault();localStorage.removeItem('vpm_user');state.user=null;state.view="login";render()});
  const grid=document.getElementById('module-grid');
  modules.forEach((mod,i)=>{
    const unlocked=i===0||state.completed.includes(modules[i-1].id);
    const done=state.completed.includes(mod.id);
    const card=document.createElement('div');
    card.className=`module-card ${done?"done":unlocked?"unlocked":"locked"}`;
    card.innerHTML=`
      ${done?'<div class="module-badge done-badge">\u2713 DONE</div>':''}
      ${!unlocked?'<div class="module-badge lock-badge">\ud83d\udd12</div>':''}
      <div class="module-icon">${mod.icon}</div>
      <div class="module-label">Module ${mod.id}</div>
      <div class="module-title">${mod.title}</div>
      <div class="module-meta">${mod.sections.length} sections \u00b7 ${mod.quiz.length} quiz questions</div>`;
    if(unlocked)card.addEventListener('click',()=>{state.currentModuleId=mod.id;state.currentSection=0;state.quizMode=false;state.quizAnswers={};state.submitted=false;state.view="study";trackEvent({event:"module_start",moduleId:mod.id,moduleName:mod.title});render();window.scrollTo(0,0)});
    grid.appendChild(card);
  });
}

function renderStudy(app){
  const mod=modules.find(m=>m.id===state.currentModuleId);
  const sec=mod.sections[state.currentSection];
  app.innerHTML=`
    <div class="study-header"><div class="container"><div class="inner">
      <button class="btn-ghost" id="back-home">\u2190 All Modules</button>
      <div class="title">${mod.icon} ${mod.title}</div>
      <button class="btn-teal" id="go-quiz">Take Quiz \u2192</button>
    </div></div></div>
    <div class="container">
      <div class="section-nav" id="sec-nav"></div>
      <div class="fade-in">
        <h2 class="section-heading">${sec.heading}</h2>
        ${sec.bodyFirst?`<p class="section-body">${applyJargon(sec.body)}</p>`:""}
        <div id="visual-mount" style="margin:20px 0"></div>
        ${sec.analogy?`<div class="analogy-box">\ud83d\udca1 <strong>Real-world analogy:</strong> ${sec.analogy}</div>`:""}
        ${!sec.bodyFirst?`<p class="section-body">${applyJargon(sec.body)}</p>`:""}
        <div class="section-footer">
          ${state.currentSection>0?`<button class="pill" id="prev-sec" style="border-color:${C.teal};color:${C.teal};padding:8px 18px">\u2190 Previous</button>`:'<div></div>'}
          ${state.currentSection<mod.sections.length-1?`<button class="btn-teal" id="next-sec" style="padding:8px 20px">Next Section \u2192</button>`:`<button class="btn-amber" id="start-quiz">${mod.id===12?"Confirm passing your qualification \u2192":"Start Quiz \u2192"}</button>`}
        </div>
      </div>
    </div>`;
  // Mount visual
  const mount=document.getElementById('visual-mount');
  if(sec.visual&&visuals[sec.visual]){
    if(sec.dark)mount.className='visual-dark';else mount.className='visual-box';
    visuals[sec.visual](mount);
  } else if(sec.visual&&sec.visual.startsWith('inline')){
    mount.className='';
    mount.style.margin='20px 0';
    renderInlineVisual(sec.visual,mount);
  }
  // Section nav
  const nav=document.getElementById('sec-nav');
  mod.sections.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className=`section-btn ${i===state.currentSection?"active":""}`;
    btn.textContent=`${i+1}. ${s.heading.split("\u2014")[0].trim().slice(0,22)}${s.heading.length>22?"\u2026":""}`;
    btn.addEventListener('click',()=>{state.currentSection=i;render();window.scrollTo(0,0)});
    nav.appendChild(btn);
  });
  // Events
  attachJargonHandlers(document.querySelector('.section-body'));
  document.getElementById('back-home')?.addEventListener('click',()=>{state.view="home";render()});
  document.getElementById('go-quiz')?.addEventListener('click',goQuiz);
  document.getElementById('start-quiz')?.addEventListener('click',goQuiz);
  document.getElementById('prev-sec')?.addEventListener('click',()=>{state.currentSection--;render();window.scrollTo(0,0)});
  document.getElementById('next-sec')?.addEventListener('click',()=>{state.currentSection++;render();window.scrollTo(0,0)});
}

function goQuiz(){state.quizMode=true;state.quizAnswers={};state.hints={};state.helps={};state.submitted=false;render();window.scrollTo(0,0)}

function renderQuiz(app){
  const mod=modules.find(m=>m.id===state.currentModuleId);
  const answered=Object.keys(state.quizAnswers).length;
  const helpsUsed=Object.keys(state.helps).length;
  const hintsUsed=Object.keys(state.hints).length;
  if(state.submitted){
    const totalCorrect=mod.quiz.filter((_,i)=>state.quizAnswers[i]===mod.quiz[i].correct).length;
    const independent=mod.quiz.filter((_,i)=>state.quizAnswers[i]===mod.quiz[i].correct&&!state.helps[i]).length;
    const passed=independent/mod.quiz.length>=.8;
    if(passed&&!state.completed.includes(mod.id)){state.completed.push(mod.id);saveCompleted()}
    trackEvent({event:"quiz_complete",moduleId:mod.id,moduleName:mod.title,score:totalCorrect,independent,totalQuestions:mod.quiz.length,passed,hintsUsed,helpsUsed});
    app.innerHTML=`
      <div class="study-header"><div class="container"><div class="inner">
        <button class="btn-ghost" id="back-study">\u2190 Back to Study</button>
        <div class="title">Quiz: ${mod.title}</div>
        <div style="color:${C.amber};font-size:12px">${answered}/${mod.quiz.length} answered</div>
      </div></div></div>
      <div class="container" style="padding-top:28px;padding-bottom:60px">
        <div class="quiz-result ${passed?"passed":"failed"}">
          <div style="font-size:48px;margin-bottom:8px">${passed?"\ud83c\udf89":"\ud83d\udcda"}</div>
          <div class="quiz-score" style="color:${passed?C.teal:C.berry}">${independent}/${mod.quiz.length}</div>
          <div style="font-size:16px;font-weight:700;color:${C.soil};margin-bottom:4px" class="${passed&&mod.id===12?"celebrate-text":""}">${passed?(mod.id===12?"\ud83c\udf89\ud83c\udf8a Congratulations! You\u2019ve completed the Vitagri & Bionutrient Institute Predictive Model Qualification! \ud83c\udf8a\ud83c\udf89":"Module Passed! \u2713"):"Keep Studying \u2014 you need 80%"}</div>
          <div style="font-size:13px;color:${C.grey};margin-bottom:4px">Independent score: ${(independent/mod.quiz.length*100).toFixed(0)}% ${passed?"":"(need 80%)"}</div>
          ${helpsUsed>0?`<div style="font-size:12px;margin-top:4px"><span style="background:${C.berry};color:${C.white};font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px">Help used: ${helpsUsed}/${mod.quiz.length}</span> <span style="color:${C.grey};font-size:11px;margin-left:4px">\u2014 these don\u2019t count towards your pass score</span></div>`:""}
          ${hintsUsed>0?`<div style="font-size:11px;color:${C.amber};margin-top:4px">Hints used: ${hintsUsed}</div>`:""}
          <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap">
            ${!passed?`<button class="btn-teal" id="retry" style="padding:10px 20px;font-size:13px">Try Again</button><button class="pill" id="review" style="border-color:${C.teal};color:${C.teal};padding:10px 20px">Review Materials</button>`:`<button class="btn-teal" id="back-all" style="padding:10px 24px;font-size:14px">\u2190 Back to All Modules</button>`}
          </div>
        </div>
        <div id="quiz-review"></div>
      </div>`;
    const review=document.getElementById('quiz-review');
    mod.quiz.forEach((q,i)=>{
      const correct=state.quizAnswers[i]===q.correct;
      const usedHelp=state.helps[i];
      const div=document.createElement('div');
      div.className=`quiz-question ${correct?"correct":"wrong"}`;
      div.innerHTML=`
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
          <span style="font-size:18px;flex-shrink:0">${correct?"\u2705":"\u274c"}</span>
          <div class="quiz-q">${q.q}${usedHelp?'<span class="help-tag">HELP USED</span>':""}</div>
        </div>
        ${q.options.map((opt,j)=>{
          let cls="quiz-opt";
          if(j===q.correct)cls+=" correct-answer";
          else if(j===state.quizAnswers[i]&&j!==q.correct)cls+=" wrong-answer";
          return`<div class="${cls}" style="cursor:default">${opt}</div>`;
        }).join("")}
        ${q.explanation?`<div class="help-box" style="margin-top:10px"><strong>Explanation:</strong> ${q.explanation}</div>`:""}`;
      review.appendChild(div);
    });
    document.getElementById('retry')?.addEventListener('click',()=>{state.quizAnswers={};state.hints={};state.helps={};state.submitted=false;render();window.scrollTo(0,0)});
    document.getElementById('review')?.addEventListener('click',()=>{state.quizMode=false;state.currentSection=0;render();window.scrollTo(0,0)});
    document.getElementById('back-all')?.addEventListener('click',()=>{state.view="home";render()});
    document.getElementById('back-study')?.addEventListener('click',()=>{state.quizMode=false;render()});
  } else {
    app.innerHTML=`
      <div class="study-header"><div class="container"><div class="inner">
        <button class="btn-ghost" id="back-study">\u2190 Back to Study</button>
        <div class="title">Quiz: ${mod.title}</div>
        <div style="color:${C.amber};font-size:12px">${answered}/${mod.quiz.length} answered</div>
      </div></div></div>
      <div class="container" style="padding-top:28px;padding-bottom:60px"><div id="quiz-questions"></div>
        <div style="text-align:center;margin-top:20px">
          <button class="btn-teal" id="submit-quiz" style="padding:12px 32px;font-size:14px;opacity:${answered===mod.quiz.length?1:.5}" ${answered<mod.quiz.length?"disabled":""}>${mod.id===12?"Send your answers to confirm qualification":"Submit Quiz"}</button>
          ${answered<mod.quiz.length?`<div style="font-size:11px;color:${C.grey};margin-top:8px">Answer all ${mod.quiz.length} questions to submit</div>`:""}
        </div>
      </div>`;
    const container=document.getElementById('quiz-questions');
    mod.quiz.forEach((q,i)=>{
      const div=document.createElement('div');
      div.className='quiz-question';
      div.innerHTML=`<div class="quiz-q">${i+1}. ${q.q}</div>`;
      q.options.forEach((opt,j)=>{
        const btn=document.createElement('button');
        btn.className=`quiz-opt ${state.quizAnswers[i]===j?"selected":""}`;
        btn.textContent=opt;
        btn.addEventListener('click',()=>{if(!state.helps[i]){state.quizAnswers[i]=j;render();}});
        div.appendChild(btn);
      });
      // Hint + Help buttons row
      const row=document.createElement('div');
      row.className='hint-help-row';
      if(q.hint&&!state.hints[i]&&!state.helps[i]){
        const hintBtn=document.createElement('button');
        hintBtn.className='btn-hint';hintBtn.textContent='\ud83d\udca1 Hint';
        hintBtn.addEventListener('click',()=>{state.hints[i]=true;render()});
        row.appendChild(hintBtn);
      }
      if(q.explanation&&!state.helps[i]){
        const helpBtn=document.createElement('button');
        helpBtn.className='btn-help';helpBtn.textContent='\ud83c\udd98 Help, I\u2019ve no idea';
        helpBtn.addEventListener('click',()=>{state.helps[i]=true;state.hints[i]=true;state.quizAnswers[i]=q.correct;render()});
        row.appendChild(helpBtn);
      }
      div.appendChild(row);
      // Show hint if revealed
      if(state.hints[i]&&q.hint&&!state.helps[i]){
        const hintBox=document.createElement('div');
        hintBox.className='hint-box';hintBox.innerHTML=`\ud83d\udca1 <strong>Hint:</strong> ${q.hint}`;
        div.appendChild(hintBox);
      }
      // Show help explanation if revealed
      if(state.helps[i]&&q.explanation){
        const helpBox=document.createElement('div');
        helpBox.className='help-box';helpBox.innerHTML=`\ud83c\udd98 <strong>Answer revealed:</strong> ${q.explanation}`;
        div.appendChild(helpBox);
      }
      container.appendChild(div);
    });
    document.getElementById('submit-quiz')?.addEventListener('click',()=>{if(answered===mod.quiz.length){state.submitted=true;if(mod.id===12)launchCelebration();render();window.scrollTo(0,0)}});
    document.getElementById('back-study')?.addEventListener('click',()=>{state.quizMode=false;render()});
  }
}

// ─── BOOT ──────────────────────────────────────────────────────
render();
