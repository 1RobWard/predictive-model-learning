<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitagri — Predictive Model Learning System</title>
<meta name="description" content="Interactive learning platform for Vitagri's bidirectional predictive nutrient density model. 10 modules from novice to expert.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --soil:#1c1510;--teal:#2a9d8f;--teal-dk:#1f7268;--berry:#8B2783;
  --lime:#9FB04F;--amber:#e9a84c;--cream:#faf7f2;--parch:#f5f0e8;
  --white:#ffffff;--grey:#6b7280;--lgrey:#e5e7eb;--red:#e74c3c;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--soil);line-height:1.6;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;transition:all .2s}
button:hover{filter:brightness(1.08)}
.container{max-width:800px;margin:0 auto;padding:0 24px}

/* Header */
.site-header{background:var(--soil);padding:40px 0 32px}
.site-header .logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.site-header .logo-icon{width:44px;height:44px;border-radius:10px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:22px}
.site-header .logo-text h1{color:var(--amber);font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
.site-header .logo-text p{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.site-header .subtitle{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:24px;line-height:1.6}
.progress-box{background:rgba(255,255,255,.05);border-radius:10px;padding:16px}
.progress-row{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-label{color:rgba(255,255,255,.6);font-size:12px}
.progress-count{color:var(--amber);font-weight:700;font-size:12px}
.progress-bar{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .5s ease}

/* Module Grid */
.module-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:32px 0 60px}
@media(max-width:600px){.module-grid{grid-template-columns:1fr}}
.module-card{background:var(--white);border-radius:12px;padding:22px;border:2px solid var(--lgrey);position:relative;overflow:hidden;transition:all .2s}
.module-card.unlocked{cursor:pointer}
.module-card.unlocked:hover{border-color:var(--teal);box-shadow:0 4px 20px rgba(42,157,143,.12)}
.module-card.locked{opacity:.5;cursor:not-allowed}
.module-card.done{border-color:var(--teal)}
.module-badge{position:absolute;top:0;right:0;font-size:10px;font-weight:700;padding:4px 12px;border-radius:0 10px 0 10px;color:var(--white)}
.module-badge.done-badge{background:var(--teal)}
.module-badge.lock-badge{background:var(--grey)}
.module-icon{font-size:28px;margin-bottom:10px}
.module-label{font-size:10px;color:var(--teal);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.module-title{font-weight:700;font-size:14px;line-height:1.3;margin-bottom:6px}
.module-meta{font-size:11px;color:var(--grey)}

/* Study View */
.study-header{background:var(--soil);padding:14px 0;position:sticky;top:0;z-index:100}
.study-header .inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.study-header .title{color:var(--white);font-weight:700;font-size:13px;text-align:center;flex:1}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:6px;padding:6px 14px;font-size:12px}
.btn-teal{background:var(--teal);border:none;color:var(--white);border-radius:6px;padding:6px 16px;font-size:12px;font-weight:700}
.btn-amber{background:var(--amber);border:none;color:var(--soil);border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700}

/* Section Nav */
.section-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;padding-top:28px}
.section-btn{background:transparent;color:var(--teal);border:1px solid var(--teal);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600}
.section-btn.active{background:var(--teal);color:var(--white)}

/* Section Content */
.section-heading{font-size:20px;font-weight:800;color:var(--soil);margin-bottom:8px;line-height:1.3}
.section-body{font-size:14px;color:#374151;line-height:1.75;margin-bottom:20px}
.section-footer{display:flex;justify-content:space-between;gap:10px;margin-bottom:40px}

/* Visual Components */
.visual-box{margin:20px 0;background:var(--white);border-radius:10px;padding:20px}
.visual-title{font-weight:700;color:var(--soil);font-size:13px;margin-bottom:4px}
.visual-desc{font-size:11px;color:var(--grey);margin-bottom:12px}
.visual-dark{background:#0d1a16;border-radius:12px;padding:24px;margin:20px 0}
.insight-box{border-radius:6px;padding:10px;font-size:11px;margin-top:8px}

/* Data Table */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;color:var(--soil);font-weight:700;font-size:11px;background:var(--parch)}
.data-table td{padding:8px 12px}
.data-table tr:nth-child(even){background:var(--cream)}
.data-table tr{border-bottom:1px solid var(--lgrey)}

/* Quiz */
.quiz-result{border-radius:12px;padding:28px;text-align:center;margin-bottom:24px;border:2px solid}
.quiz-result.passed{background:rgba(42,157,143,.08);border-color:var(--teal)}
.quiz-result.failed{background:rgba(139,39,131,.08);border-color:var(--berry)}
.quiz-score{font-size:48px;font-weight:800;margin:8px 0}
.quiz-question{background:var(--white);border-radius:10px;padding:18px;margin-bottom:12px;border:1px solid var(--lgrey)}
.quiz-question.correct{border-color:var(--teal);border-left:4px solid var(--teal)}
.quiz-question.wrong{border-color:var(--berry);border-left:4px solid var(--berry)}
.quiz-q{font-weight:700;font-size:13px;line-height:1.4;margin-bottom:12px}
.quiz-opt{display:block;width:100%;text-align:left;background:var(--cream);border:2px solid transparent;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:12px;color:var(--soil);transition:all .15s}
.quiz-opt:hover{border-color:var(--teal);background:rgba(42,157,143,.06)}
.quiz-opt.selected{border-color:var(--teal);background:rgba(42,157,143,.1);font-weight:600}
.quiz-opt.correct-answer{border-color:var(--teal);background:rgba(42,157,143,.15)}
.quiz-opt.wrong-answer{border-color:var(--berry);background:rgba(139,39,131,.1)}

/* Grid helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:600px){.grid-4{grid-template-columns:repeat(2,1fr)}}

/* Pill buttons */
.pill{border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;border:1px solid}
.pill.active{color:var(--white)}

/* Slider */
input[type=range]{width:100%;height:6px;-webkit-appearance:none;background:var(--lgrey);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--teal);cursor:pointer;border:2px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── COLOUR PALETTE ────────────────────────────────────────────
const C={soil:"#1c1510",teal:"#2a9d8f",tealDk:"#1f7268",berry:"#8B2783",lime:"#9FB04F",amber:"#e9a84c",cream:"#faf7f2",parch:"#f5f0e8",white:"#ffffff",grey:"#6b7280",lgrey:"#e5e7eb",red:"#e74c3c"};

// ─── STATE ─────────────────────────────────────────────────────
const state={view:"home",currentModuleId:null,currentSection:0,quizMode:false,quizAnswers:{},submitted:false,completed:JSON.parse(localStorage.getItem('vpm_completed')||'[]')};
function saveCompleted(){localStorage.setItem('vpm_completed',JSON.stringify(state.completed))}

// ─── VISUAL RENDERERS ──────────────────────────────────────────
function renderBiDirectionalFlow(el){
  let dir="forward";
  const farmInputs=["Tillage Method","Soil Organic Matter","Cover Crops","Nitrogen Rate","Livestock Integration"];
  const foodOutputs=["Iron Content","Omega-3 Level","Polyphenols","Zinc Content","Vitamin C"];
  function draw(){
    const left=dir==="forward"?farmInputs:foodOutputs;
    const right=dir==="forward"?foodOutputs:farmInputs;
    const mc=dir==="forward"?C.teal:C.berry;
    el.innerHTML=`
      <div style="text-align:center;margin-bottom:16px;display:flex;gap:8px;justify-content:center">
        <button class="pill ${dir==="forward"?"active":""}" data-dir="forward" style="background:${dir==="forward"?C.teal:"transparent"};color:${dir==="forward"?C.white:C.teal};border-color:${C.teal}">Forward Model</button>
        <button class="pill ${dir==="reverse"?"active":""}" data-dir="reverse" style="background:${dir==="reverse"?C.berry:"transparent"};color:${dir==="reverse"?C.white:C.berry};border-color:${C.berry}">Reverse Model</button>
      </div>
      <div style="display:flex;align-items:center;gap:16px;justify-content:center;flex-wrap:wrap">
        <div style="background:rgba(42,157,143,.1);border:1px solid ${C.teal};border-radius:10px;padding:16px 20px;min-width:150">
          <div style="font-size:10px;color:${C.teal};font-weight:700;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase">${dir==="forward"?"Farm Inputs":"Food Fingerprint"}</div>
          ${left.map(item=>`<div style="font-size:12px;color:#b0c8c0;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:6px"><span style="width:6px;height:6px;background:${C.teal};border-radius:50%;display:inline-block;flex-shrink:0"></span>${item}</div>`).join("")}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <div style="background:${dir==="forward"?`linear-gradient(135deg,${C.teal},${C.tealDk})`:`linear-gradient(135deg,${C.berry},#6b1a64)`};border-radius:10px;padding:14px 20px;text-align:center;min-width:130">
            <div style="font-size:11px;color:rgba(255,255,255,.7);margin-bottom:4px">${dir==="forward"?"FORWARD MODEL":"REVERSE MODEL"}</div>
            <div style="font-size:13px;color:${C.white};font-weight:700">ML Algorithm</div>
            <div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:4px">GLMM + XGBoost</div>
          </div>
          <div style="font-size:28px;color:${mc};animation:pulse 1.5s ease-in-out infinite">${dir==="forward"?"&rarr;":"&larr;"}</div>
        </div>
        <div style="background:${dir==="reverse"?`rgba(139,39,131,.1)`:`rgba(42,157,143,.1)`};border:1px solid ${dir==="reverse"?C.berry:C.teal};border-radius:10px;padding:16px 20px;min-width:150">
          <div style="font-size:10px;color:${dir==="reverse"?C.berry:C.teal};font-weight:700;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase">${dir==="forward"?"Predicted Nutrition":"Inferred Farming System"}</div>
          ${right.map(item=>`<div style="font-size:12px;color:#b0c8c0;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:6px"><span style="width:6px;height:6px;background:${dir==="forward"?C.amber:C.berry};border-radius:50%;display:inline-block;flex-shrink:0"></span>${item}</div>`).join("")}
        </div>
      </div>
      <div style="text-align:center;margin-top:12px;font-size:11px;color:#6a8a80">Click the buttons above to switch between the two model directions</div>`;
    el.querySelectorAll('[data-dir]').forEach(btn=>btn.addEventListener('click',()=>{dir=btn.dataset.dir;draw()}));
  }
  draw();
}

function renderVariableTypes(el){
  const types=[
    {name:"Continuous",color:C.teal,examples:["Soil organic matter: 3.2%","pH: 6.7","Nitrogen: 120 kg/ha","Iron: 4.8 mg/100g"],desc:"Any value in a range \u2014 measured on a number line"},
    {name:"Binary",color:C.amber,examples:["Cover crop: Yes / No","Organic certified: Yes / No","Livestock on farm: Yes / No"],desc:"Exactly two possible values \u2014 on or off"},
    {name:"Categorical",color:C.berry,examples:["Tillage: No-till / Min-till / Conventional","Crop: Wheat / Barley / Oats"],desc:"Named groups with no meaningful numeric order"},
    {name:"Ordinal",color:C.lime,examples:["Biodiversity score: Low / Med / High","Compaction: 1 / 2 / 3 / 4 / 5"],desc:"Categories with a meaningful order but unequal gaps"},
  ];
  let active=0;
  function draw(){
    const t=types[active];
    let extra="";
    if(t.name==="Continuous"){
      extra=`<svg width="100%" height="50" viewBox="0 0 400 50" style="margin-top:16px">
        <line x1="20" y1="25" x2="380" y2="25" stroke="${C.lgrey}" stroke-width="2"/>
        ${[0,1,2,3,4,5,6,7].map(i=>`<line x1="${20+i*51}" y1="20" x2="${20+i*51}" y2="30" stroke="${C.teal}" stroke-width="1.5"/><text x="${20+i*51}" y="45" text-anchor="middle" font-size="9" fill="${C.grey}">${(i*0.7+1.5).toFixed(1)}%</text>`).join("")}
        <circle cx="175" cy="25" r="6" fill="${C.teal}"/><text x="175" y="15" text-anchor="middle" font-size="9" fill="${C.tealDk}" font-weight="bold">3.2%</text>
      </svg>`;
    }
    if(t.name==="Binary"){
      extra=`<div style="display:flex;gap:20px;margin-top:16px">${["YES","NO"].map((v,i)=>`<div style="flex:1;background:${i===0?"#e8f7f4":"#fdf0f0"};border:2px solid ${i===0?C.teal:C.red};border-radius:8px;padding:16px;text-align:center;font-size:20px;font-weight:800;color:${i===0?C.teal:C.red}">${v}</div>`).join("")}</div>`;
    }
    el.innerHTML=`
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        ${types.map((tp,i)=>`<button data-idx="${i}" class="pill ${active===i?"active":""}" style="background:${active===i?tp.color:"transparent"};color:${active===i?C.white:tp.color};border-color:${tp.color};border-width:2px;font-weight:700;font-size:13px">${tp.name}</button>`).join("")}
      </div>
      <div style="background:${C.white};border:2px solid ${t.color};border-radius:10px;padding:20px">
        <div style="font-size:12px;color:${t.color};font-weight:700;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase">${t.name} Variable</div>
        <div style="font-size:13px;color:${C.grey};margin-bottom:14px">${t.desc}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${t.examples.map(ex=>`<div style="background:${t.color}15;border:1px solid ${t.color}40;border-radius:6px;padding:6px 12px;font-size:12px;color:${C.soil}">${ex}</div>`).join("")}
        </div>
        ${extra}
      </div>`;
    el.querySelectorAll('[data-idx]').forEach(btn=>btn.addEventListener('click',()=>{active=+btn.dataset.idx;draw()}));
  }
  draw();
}

function renderFourStreams(el){
  const streams=[
    {id:1,name:"Farming Practices",icon:"\ud83d\ude9c",color:C.teal,items:["Tillage method","Nitrogen rate","Cover crops","Crop rotation","Livestock integration"]},
    {id:2,name:"Soil Health",icon:"\ud83c\udf0d",color:C.lime,items:["Organic matter %","Soil pH","Available nutrients","Microbial biomass","Bulk density"]},
    {id:3,name:"Microbial Profiles",icon:"\ud83e\udda0",color:C.berry,items:["Bacterial communities","Fungal communities","Species diversity","Alpha diversity index","Beta diversity"]},
    {id:4,name:"Metabolomics",icon:"\u2697\ufe0f",color:C.amber,items:["Polyphenols","Fatty acid profile","Amino acids","Vitamins & precursors","Secondary metabolites"]},
  ];
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
      ${streams.map(s=>`
        <div style="background:${C.white};border:2px solid ${s.color}30;border-radius:10px;padding:16px;border-top:4px solid ${s.color}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <span style="font-size:22px">${s.icon}</span>
            <div><div style="font-size:10px;color:${s.color};font-weight:700;letter-spacing:1px;text-transform:uppercase">Stream ${s.id}</div><div style="font-size:13px;font-weight:700;color:${C.soil}">${s.name}</div></div>
          </div>
          ${s.items.map(item=>`<div style="font-size:12px;color:${C.grey};padding:3px 0;display:flex;align-items:center;gap:6px"><span style="width:4px;height:4px;background:${s.color};border-radius:50%;display:inline-block;flex-shrink:0"></span>${item}</div>`).join("")}
        </div>`).join("")}
    </div>
    <div style="background:${C.soil};border-radius:10px;padding:14px;margin-top:12px;text-align:center">
      <div style="color:${C.amber};font-weight:700;font-size:13px;margin-bottom:4px">&darr; All Four Streams Combined</div>
      <div style="color:#b0c8c0;font-size:12px">Feed into Vitagri's Predictive Model &rarr; Nutrient Density Score + Farming System Verification</div>
    </div>`;
}

function renderBellCurve(el){
  const pts=[];
  for(let x=-3.5;x<=3.5;x+=.05)pts.push({x,y:Math.exp(-.5*x*x)/Math.sqrt(2*Math.PI)});
  const sx=x=>(x+3.5)/7*360+20;
  const sy=y=>120-y/.4*80;
  const d="M "+pts.map(p=>`${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`).join(" L ");
  el.innerHTML=`
    <div class="visual-title">Normal Distribution \u2014 The Bell Curve</div>
    <div class="visual-desc">Most values cluster near the mean, fewer at extremes \u2014 like vitamin C in apples from one orchard</div>
    <svg width="100%" viewBox="0 0 400 140">
      <line x1="20" y1="125" x2="380" y2="125" stroke="${C.lgrey}" stroke-width="1.5"/>
      <path d="${d}" fill="${C.teal}25" stroke="${C.teal}" stroke-width="2"/>
      <line x1="200" y1="30" x2="200" y2="125" stroke="${C.amber}" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="200" y="22" text-anchor="middle" font-size="10" fill="${C.amber}" font-weight="bold">Mean (average)</text>
      ${[[-1,"\u22121 SD"],[1,"+1 SD"],[-2,"\u22122 SD"],[2,"+2 SD"]].map(([x,label])=>`<line x1="${sx(x).toFixed(1)}" y1="90" x2="${sx(x).toFixed(1)}" y2="125" stroke="${C.lgrey}" stroke-width="1" stroke-dasharray="3,2"/><text x="${sx(x).toFixed(1)}" y="138" text-anchor="middle" font-size="8" fill="${C.grey}">${label}</text>`).join("")}
      <text x="200" y="70" text-anchor="middle" font-size="9" fill="${C.teal}">68% of values</text>
      <line x1="${sx(-1).toFixed(1)}" y1="80" x2="${sx(1).toFixed(1)}" y2="80" stroke="${C.teal}" stroke-width="1"/>
      <text x="50" y="60" font-size="9" fill="${C.grey}">Fewer farms</text>
      <text x="290" y="60" font-size="9" fill="${C.grey}">Fewer farms</text>
      <text x="150" y="110" font-size="9" fill="${C.soil}">Most farms</text>
    </svg>`;
}

function renderCorrelation(el){
  let strength=0.8;
  const seed=42;
  const rand=(i,s)=>{let x=Math.sin(i*s+seed)*10000;return x-Math.floor(x)};
  function draw(){
    const n=30;
    const pts=Array.from({length:n},(_,i)=>{
      const x=rand(i,1.7)*80+10;
      const noise=(rand(i,3.1)-.5)*2*(1-Math.abs(strength))*50;
      const y=strength>=0?(100-(x*strength+noise)):((100+x*strength+noise));
      return{x,y:Math.max(5,Math.min(95,y))};
    });
    const label=strength>0.7?"Strong Positive":strength>0.3?"Moderate Positive":strength>-0.3?"Weak / No Relationship":strength>-0.7?"Moderate Negative":"Strong Negative";
    const col=strength>0?C.teal:C.berry;
    el.innerHTML=`
      <div class="visual-title">Correlation \u2014 How Two Variables Relate</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <span style="font-size:11px;color:${C.grey}">Drag slider: r =</span>
        <span style="font-weight:800;color:${col};font-size:16px;min-width:40px">${strength.toFixed(1)}</span>
        <input type="range" min="-10" max="10" step="1" value="${Math.round(strength*10)}" id="corr-slider" style="flex:1;accent-color:${col}">
        <span style="font-size:11px;color:${col};font-weight:600;min-width:120px">${label}</span>
      </div>
      <svg width="100%" viewBox="0 0 200 120">
        <line x1="15" y1="5" x2="15" y2="110" stroke="${C.lgrey}" stroke-width="1"/>
        <line x1="15" y1="110" x2="195" y2="110" stroke="${C.lgrey}" stroke-width="1"/>
        <text x="105" y="120" text-anchor="middle" font-size="7" fill="${C.grey}">Farming Practice Variable &rarr;</text>
        ${strength!==0?`<line x1="15" y1="${strength>0?105:10}" x2="195" y2="${strength>0?10:105}" stroke="${col}" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>`:""}
        ${pts.map(pt=>`<circle cx="${(15+pt.x*1.8).toFixed(1)}" cy="${(pt.y*1.05).toFixed(1)}" r="2.5" fill="${col}" opacity="0.7"/>`).join("")}
      </svg>

function renderRegression(el){

      <svg width="100%" viewBox="0 0 220 150">

        <line x1="${sx(0)}" y1="${sy(intercept)}" x2="${sx(7)}" y2="${sy(slope*7+intercept)}" stroke="${C.amber}" stroke-width="2" stroke-dasharray="5,3"/>
        ${show?rawPts.map(pt=>{const pred=slope*pt.x+intercept;return`<line x1="${sx(pt.x)}" y1="${sy(pt.y)}" x2="${sx(pt.x)}" y2="${sy(pred)}" stroke="${C.red}" stroke-width="1" stroke-dasharray="2,1"/>`}).join(""):""}
        ${rawPts.map(pt=>`<circle cx="${sx(pt.x)}" cy="${sy(pt.y)}" r="4" fill="${C.teal}" stroke="${C.white}" stroke-width="1"/>`).join("")}

      <button id="resid-btn" style="background:${show?C.berry:C.teal};color:${C.white};border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;margin-top:8px">${show?"Hide Residuals (Errors)":"Show Residuals (Errors)"}</button>
      ${show?`<div style="background:#fff0f0;border:1px solid ${C.red};border-radius:6px;padding:10px;margin-top:8px;font-size:11px;color:#c0392b">Red lines = residuals: the gap between prediction (line) and reality (dot). A good model has small, random residuals.</div>`:""}`;
    document.getElementById('resid-btn')?.addEventListener('click',()=>{show=!show;draw()});

function renderTrainTestSplit(el){
  let showKfold=false,kRound=0;

    if(!showKfold){
      el.innerHTML=`
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="pill active" data-mode="standard" style="background:${C.teal};color:${C.white};border-color:${C.teal}">Standard Split</button>

        </div>
        <div style="background:${C.white};border-radius:10px;padding:16px">
          <div style="font-size:12px;color:${C.grey};margin-bottom:12px">All available data is divided into three independent groups:</div>

            <div style="flex:65;background:${C.teal}30;display:flex;align-items:center;justify-content:center;border-right:2px solid ${C.white};font-size:11px;font-weight:700;color:${C.tealDk}">TRAINING SET \u2014 65%</div>
            <div style="flex:20;background:${C.amber}30;display:flex;align-items:center;justify-content:center;border-right:2px solid ${C.white};font-size:11px;font-weight:700;color:#8B6914">VALIDATION \u2014 20%</div>
            <div style="flex:15;background:${C.berry}30;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${C.berry}">TEST \u2014 15%</div>
          </div>
          ${[{col:C.teal,label:"Training Set (65%)",desc:"Model LEARNS from this data. All fitting happens here."},
            {col:C.amber,label:"Validation Set (20%)",desc:"Used to tune settings. Model hasn't 'seen' it during training."},
            {col:C.berry,label:"Test Set (15%) \u2014 NEVER TOUCH UNTIL END",desc:"Used ONCE, at the very end. Gives honest final performance estimate."}
          ].map(r=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid ${C.lgrey}"><div style="width:14px;height:14px;border-radius:3px;background:${r.col};margin-top:2px;flex-shrink:0"></div><div><div style="font-size:12px;font-weight:700;color:${C.soil}">${r.label}</div><div style="font-size:11px;color:${C.grey}">${r.desc}</div></div></div>`).join("")}
        </div>`;
    } else {
      const foldColors=(round,fold)=>fold===round?{bg:"#fff3cd",border:C.amber,label:"VALIDATE"}:{bg:"#e8f7f4",border:C.teal,label:"TRAIN"};
      el.innerHTML=`
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="pill" data-mode="standard" style="background:transparent;color:${C.teal};border-color:${C.teal}">Standard Split</button>
          <button class="pill active" data-mode="kfold" style="background:${C.berry};color:${C.white};border-color:${C.berry}">K-Fold Cross-Validation</button>
        </div>
        <div style="background:${C.white};border-radius:10px;padding:16px">
          <div style="font-size:12px;color:${C.grey};margin-bottom:10px">With only 30 farms, k-fold uses ALL data for both training and validation by rotating which group is tested:</div>
          <div style="display:flex;gap:6px;margin-bottom:12px;justify-content:center">
            ${[0,1,2,3,4].map(i=>`<button data-round="${i}" style="background:${kRound===i?C.soil:"transparent"};color:${kRound===i?C.white:C.soil};border:1px solid ${C.soil};border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600">Round ${i+1}</button>`).join("")}
          </div>
          <div style="display:flex;gap:6px;justify-content:center;margin-bottom:12px">
            ${[0,1,2,3,4].map(fold=>{const{bg,border,label}=foldColors(kRound,fold);return`<div style="flex:1;background:${bg};border:2px solid ${border};border-radius:6px;padding:8px;text-align:center"><div style="font-size:10px;font-weight:700;color:${border}">Fold ${fold+1}</div><div style="font-size:9px;color:${border};margin-top:2px">${label}</div></div>`}).join("")}
          </div>
          <div style="background:${C.teal}10;border-radius:6px;padding:10px;font-size:11px;color:${C.tealDk}">
            Round ${kRound+1}: Fold ${kRound+1} is the validation set. The other 4 folds train the model. After all 5 rounds, every farm has been validated exactly once. Average the 5 performance scores for a reliable estimate.
          </div>
        </div>`;
      el.querySelectorAll('[data-round]').forEach(btn=>btn.addEventListener('click',()=>{kRound=+btn.dataset.round;draw()}));
    }
    el.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{showKfold=btn.dataset.mode==="kfold";draw()}));
  }
  draw();
}

function renderComposition(el){
  let vals=[35,30,25,10];
  const labels=["Bacteria A","Bacteria B","Bacteria C","Other"];
  const colors=[C.teal,C.berry,C.lime,C.amber];
  function draw(){
    const total=vals.reduce((a,b)=>a+b,0);
    let cumAngle=0;
    const slices=vals.map((v,i)=>{
      const angle=(v/total)*360;const start=cumAngle;cumAngle+=angle;
      const r=60,cx=80,cy=80;
      const startRad=start*Math.PI/180,endRad=(start+angle)*Math.PI/180;
      const x1=cx+r*Math.sin(startRad),y1=cy-r*Math.cos(startRad);
      const x2=cx+r*Math.sin(endRad),y2=cy-r*Math.cos(endRad);
      const large=angle>180?1:0;
      return{d:`M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${large},1,${x2.toFixed(1)},${y2.toFixed(1)}Z`,col:colors[i],pct:((v/total)*100).toFixed(0)};
    });
    el.innerHTML=`
      <div class="visual-title">Compositional Data \u2014 The Problem with Microbiome Data</div>
      <div class="visual-desc">Microbial abundance is always relative (sums to 100%). Drag the sliders \u2014 notice how changing one species forces others to change too.</div>
      <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
        <svg width="160" height="160" viewBox="0 0 160 160">${slices.map(s=>`<path d="${s.d}" fill="${s.col}" stroke="${C.white}" stroke-width="2"/>`).join("")}</svg>
        <div style="flex:1">${vals.map((v,i)=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:${C.soil};display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;background:${colors[i]};border-radius:2px;display:inline-block"></span>${labels[i]}</span><span style="font-size:11px;font-weight:700;color:${colors[i]}">${((v/total)*100).toFixed(0)}%</span></div><input type="range" min="1" max="60" value="${v}" data-idx="${i}" style="accent-color:${colors[i]}"></div>`).join("")}</div>
      </div>
      <div style="background:#fff0f0;border-radius:6px;padding:10px;font-size:11px;color:#c0392b;margin-top:8px"><strong>The problem:</strong> Standard correlation analyses assume variables are independent. But if Bacteria A increases, the others MUST decrease \u2014 they share the 100% total. CLR transformation corrects for this before modelling.</div>`;
    el.querySelectorAll('input[data-idx]').forEach(inp=>inp.addEventListener('input',e=>{vals[+e.target.dataset.idx]=+e.target.value;draw()}));
  }
  draw();
}

function renderConfusionMatrix(el){
  let threshold=0.5;
  function draw(){
    const tp=Math.round(28*threshold/.5),fp=Math.round(8*(1-threshold/.5)),fn=Math.round(7*(threshold/.5)),tn=Math.round(32*(1-threshold*.3));
    const precision=tp/(tp+Math.max(fp,1)),recall=tp/(tp+Math.max(fn,1)),f1=2*precision*recall/(precision+recall||1);
    el.innerHTML=`
      <div class="visual-title">Confusion Matrix \u2014 Classifying High vs Low Nutrient Farms</div>
      <div class="grid-2" style="align-items:start">
        <div>
          <div style="font-size:11px;color:${C.grey};margin-bottom:12px">Classification threshold: <strong style="color:${C.teal}">${threshold.toFixed(2)}</strong></div>
          <input type="range" min="30" max="90" step="5" value="${Math.round(threshold*100)}" id="cm-slider" style="margin-bottom:16px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px">
            ${[{val:tp,label:"True Positives",sub:"Correctly flagged as HIGH",col:C.teal,bg:C.teal+"20"},{val:fp,label:"False Positives",sub:"Incorrectly flagged as HIGH",col:C.red,bg:"#fde8e8"},{val:fn,label:"False Negatives",sub:"Missed HIGH farms",col:"#f39c12",bg:"#fff3cd"},{val:tn,label:"True Negatives",sub:"Correctly flagged as LOW",col:C.tealDk,bg:C.lime+"25"}].map(c=>`<div style="background:${c.bg};border:2px solid ${c.col};border-radius:6px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:${c.col}">${c.val}</div><div style="color:${c.col};font-weight:700">${c.label}</div><div style="color:${C.grey};font-size:10px">${c.sub}</div></div>`).join("")}
          </div>
        </div>
        <div>
          ${[{label:"Precision",val:precision,col:C.teal,desc:"Of farms we called HIGH, how many actually were?"},{label:"Recall",val:recall,col:C.berry,desc:"Of all actual HIGH farms, how many did we catch?"},{label:"F1 Score",val:f1,col:C.amber,desc:"Harmonic mean \u2014 balanced measure of both"}].map(m=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div><div style="font-size:12px;font-weight:700;color:${m.col}">${m.label}</div><div style="font-size:10px;color:${C.grey}">${m.desc}</div></div><div style="font-size:22px;font-weight:800;color:${m.col}">${m.val.toFixed(2)}</div></div><div style="height:6px;background:${C.lgrey};border-radius:3px;overflow:hidden"><div style="height:100%;width:${m.val*100}%;background:${m.col};border-radius:3px;transition:width .3s"></div></div></div>`).join("")}
          <div style="background:${C.teal}10;border-radius:6px;padding:10px;font-size:11px;color:${C.tealDk}"><strong>Try the slider:</strong> Higher threshold = fewer false positives but more missed farms.</div>
        </div>
      </div>`;
    document.getElementById('cm-slider')?.addEventListener('input',e=>{threshold=+e.target.value/100;draw()});
  }
  draw();
}

}

function renderConfidenceGauge(el){
  let score=74;
  function draw(){
    const col=score>=80?C.teal:score>=60?C.amber:C.berry;
    const label=score>=80?"HIGH CONFIDENCE \u2014 Issue Certification":score>=60?"BORDERLINE \u2014 Request Additional Samples":"INSUFFICIENT \u2014 Do Not Certify";
    const cx=100,cy=90,r=70;
    const angle=(-135+score*2.7)*Math.PI/180;
    const nx=cx+r*Math.cos(angle),ny=cy+r*Math.sin(angle);
    el.innerHTML=`
      <div class="visual-title">Confidence Score Gauge \u2014 Vitagri's Certification Decision</div>
      <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
        <svg width="200" height="140" viewBox="0 0 200 140">
          ${[C.berry,C.amber,C.teal].map((c,i)=>{const sa=(-135+i*90)*Math.PI/180,ea=(-135+(i+1)*90)*Math.PI/180;const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);return`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,0,1,${x2.toFixed(1)},${y2.toFixed(1)}Z" fill="${c}" opacity=".25" stroke="${C.white}" stroke-width="1"/>`}).join("")}
          <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="3" stroke-linecap="round"/>
          <circle cx="${cx}" cy="${cy}" r="6" fill="${col}"/>
          <text x="${cx}" y="${cy+25}" text-anchor="middle" font-size="22" fill="${col}" font-weight="800">${score}%</text>
          <text x="30" y="125" font-size="8" fill="${C.berry}" font-weight="600">&lt;60</text>
          <text x="90" y="138" font-size="8" fill="${C.amber}" font-weight="600">60\u201380</text>
          <text x="155" y="125" font-size="8" fill="${C.teal}" font-weight="600">&gt;80</text>
        </svg>
        <div style="flex:1">
          <div style="background:${col}15;border:2px solid ${col};border-radius:8px;padding:12px;margin-bottom:12px;text-align:center"><div style="font-weight:800;color:${col};font-size:13px">${label}</div></div>
          <input type="range" min="0" max="100" value="${score}" id="gauge-slider" style="margin-bottom:8px;accent-color:${col}">
          <div style="font-size:11px;color:${C.grey}">Drag the slider to see how the decision threshold changes.</div>
        </div>
      </div>`;
    document.getElementById('gauge-slider')?.addEventListener('input',e=>{score=+e.target.value;draw()});
  }
  draw();
}

function renderErrorMetrics(el){
  const farms=[{id:"Farm 1",actual:5.2,predicted:5.1},{id:"Farm 2",actual:3.8,predicted:4.6},{id:"Farm 3",actual:6.1,predicted:5.9},{id:"Farm 4",actual:2.9,predicted:4.2},{id:"Farm 5",actual:4.7,predicted:4.8},{id:"Farm 6",actual:5.5,predicted:5.3}];
  const errors=farms.map(f=>({...f,err:f.predicted-f.actual,absErr:Math.abs(f.predicted-f.actual)}));
  const mae=(errors.reduce((a,b)=>a+b.absErr,0)/errors.length).toFixed(2);
  const rmse=Math.sqrt(errors.reduce((a,b)=>a+b.err**2,0)/errors.length).toFixed(2);
  el.innerHTML=`
    <div class="visual-title">MAE vs RMSE \u2014 Why Both Matter</div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr style="background:${C.parch}">${["Farm","Actual Iron","Predicted","Error","|Error|","Error\u00b2"].map(h=>`<th style="border-bottom:2px solid ${C.teal}">${h}</th>`).join("")}</tr></thead>
        <tbody>${errors.map((r,i)=>`<tr><td style="font-weight:600">${r.id}</td><td>${r.actual}</td><td>${r.predicted}</td><td style="color:${r.err>0?C.berry:C.teal};font-weight:600">${r.err>0?"+":""}${r.err.toFixed(1)}</td><td style="color:${C.amber};font-weight:600">${r.absErr.toFixed(1)}</td><td style="color:${Math.abs(r.err)>.8?C.red:C.grey};font-weight:${Math.abs(r.err)>.8?700:400}">${(r.err**2).toFixed(2)}</td></tr>`).join("")}</tbody>
      </table>
    </div>
    <div class="grid-2" style="margin-top:12px">
      <div style="background:${C.teal}10;border:1px solid ${C.teal};border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:${C.grey}">Mean Absolute Error</div><div style="font-size:28px;font-weight:800;color:${C.teal}">${mae}</div><div style="font-size:10px;color:${C.grey}">mg/100g \u2014 treats all errors equally</div></div>
      <div style="background:#fff3cd;border:1px solid #f39c12;border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:${C.grey}">Root Mean Squared Error</div><div style="font-size:28px;font-weight:800;color:#f39c12">${rmse}</div><div style="font-size:10px;color:${C.grey}">mg/100g \u2014 penalises big errors more</div></div>
    </div>`;
}

     body:"Every real dataset has problems. Professional data scientists spend 50\u201380% of their time on data cleaning and quality assurance \u2014 not building models. Vitagri\u2019s data collection protocol is designed to minimise issues at source (standardised survey instruments, automated range checks, duplicate entry for critical measurements) but post-collection cleaning remains essential before any model is fitted."},
  ],quiz:[
    {q:"Tillage method (no-till / min-till / conventional) is what type of variable?",options:["Continuous","Binary","Categorical","Ordinal"],correct:2},
    {q:"Which data stream provides the 'ground truth' nutrient measurement?",options:["Farming practices","Soil health data","Microbial profiles","Metabolomics"],correct:3},
    {q:"Farm 8 records soil pH as 13.1. What is the most appropriate first response?",options:["Accept it \u2014 unusual farms exist","Delete the farm from the dataset","Flag for manual review \u2014 likely a data entry error","Replace with the mean pH"],correct:2},
    {q:"You have 28 conventional farms and only 2 organic farms. This is called:",options:["Missing data","Class imbalance","An outlier","A random effect"],correct:1},
    {q:"What does 'dummy encoding' do to a categorical variable?",options:["Converts it to a decimal number","Splits it into multiple binary (0/1) columns","Removes it from the analysis","Calculates its correlation"],correct:1},
  ]},
  {id:3,title:"Statistics Foundations",icon:"\ud83d\udcd0",sections:[
    {heading:"Distributions \u2014 What Does Your Data Look Like?",visual:"bell",
     body:"Before choosing a statistical model, you need to understand the distribution of your outcome variable. Iron content across farms typically follows a roughly normal distribution \u2014 most farms cluster around the average, with fewer at the extremes. However, some nutrient variables (like specific polyphenols) are right-skewed. Skewed distributions often need log-transformation before modelling."},
    {heading:"Correlation \u2014 How Variables Relate",visual:"corr",
     body:"Correlation (Pearson r) measures the strength and direction of the linear relationship between two continuous variables. Drag the slider to explore what different correlation strengths look like visually. Critical warning: correlation does not equal causation. Soil organic matter is correlated with iron, but the mechanism involves complex microbial processes \u2014 not a direct chemical pathway."},
    {heading:"Regression \u2014 The Foundation of Prediction",visual:"regression",
     body:"Regression finds the line (or surface in multiple dimensions) that best fits the observed data points. \u2018Best fit\u2019 means minimising the sum of squared residuals \u2014 the vertical distances between each data point and the line. Toggle the residuals button above to see these errors."},
  ],quiz:[
    {q:"A right-skewed distribution of polyphenol values means:",options:["Most farms have very high polyphenols","Most farms have low polyphenols, with a few very high outliers","The data is normally distributed","The model cannot be applied"],correct:1},
    {q:"A correlation of r = \u22120.78 between synthetic nitrogen and iron content means:",options:["Applying more nitrogen directly destroys iron","There is a strong positive relationship","Higher nitrogen rates are strongly associated with lower iron content","There is no meaningful relationship"],correct:2},
    {q:"What are 'residuals' in a regression model?",options:["The variables excluded from the model","The difference between predicted and actual values","The coefficients assigned to each predictor","The training farms not used for fitting"],correct:1},
    {q:"Correlation does not equal causation. Which example best illustrates this?",options:["Soil pH and iron have r=0.12","Cover crops correlate with high nutrients \u2014 but wealthier farms may both use cover crops AND have better soil history","Nitrogen and iron have r=\u22120.45 \u2014 proving nitrogen causes iron deficiency","Organic matter has r=+0.72 \u2014 proving it directly creates iron"],correct:1},
    {q:"What does minimising 'sum of squared residuals' achieve?",options:["It removes outliers","It ensures all variables are used","It finds the line that best fits the data points","It standardises all variables"],correct:2},
  ]},
  {id:4,title:"Introduction to Machine Learning",icon:"\ud83e\udd16",sections:[
    {heading:"Supervised vs Unsupervised Learning",visual:"inline4",
     body:"Vitagri\u2019s core predictive model is supervised \u2014 we have labelled data (farms with known nutrient measurements). Unsupervised methods appear in the preprocessing pipeline, particularly PCA for metabolomics data reduction. Supervised models make predictions on new data; unsupervised models reveal structure in existing data."},
    {heading:"Train, Validate and Test \u2014 Never Cheat",visual:"split",
     body:"The single most important rule in machine learning: never evaluate your model on the same data it was trained on. With only 30 farms, this requires careful management. The test set is sacred: it is only used at the very end, once, to report final performance. Peeking at it during development invalidates your results."},
    {heading:"Overfitting and Feature Scaling",visual:"overfit",
     body:"Overfitting occurs when a model learns the training data so thoroughly that it memorises noise rather than genuine patterns. With 30 farms and potentially 50+ variables, overfitting is a major risk. Solutions include regularisation, cross-validation, and feature selection."},
  ],quiz:[
    {q:"Vitagri's forward model (practices \u2192 nutrient prediction) is an example of:",options:["Unsupervised learning","Reinforcement learning","Supervised learning","Transfer learning"],correct:2},
    {q:"Why is the test set only used ONCE?",options:["It takes too long otherwise","Using it multiple times would cause overfitting to the test set itself","It must be reserved for GLMM not XGBoost","Government regulations require this"],correct:1},
    {q:"K-fold cross-validation with 5 folds on 30 farms means:",options:["Each fold trains on 5 farms and validates on 25","Each round validates on 6 farms while training on the other 24","The test set is split into 5 equal parts","The model is trained 5 times on the full dataset"],correct:1},
    {q:"A model achieves R\u00b2=0.98 on training but R\u00b2=0.54 on validation. This is:",options:["Excellent generalisation","Normal variance","Underfitting","Overfitting"],correct:3},
    {q:"Feature scaling is needed because:",options:["It improves interpretability","Variables in different units would otherwise have unequal influence based purely on scale","The GLMM requires it mathematically","Scaling reduces trees needed"],correct:1},
  ]},
  {id:5,title:"Generalised Linear Mixed Models",icon:"\ud83d\udcc9",sections:[
    {heading:"Building from Regression to GLMM",visual:"inline5",
     body:"The GLMM is not a completely different algorithm from regression \u2014 it is an extension that adds two capabilities: (1) handling non-normal distributions via a link function g(), and (2) handling clustered/nested data via random effects. For Vitagri, we use a Gaussian GLMM for continuous outcomes like iron content."},
    {heading:"Fixed Effects vs Random Effects",visual:"glmm",
     body:"Fixed effects are the main findings: the average effect of cover crops, organic matter, and nitrogen rate across all farms. Random effects account for the fact that farms are the sampling unit, not individual soil samples. Ignoring this structure would inflate false positives and underestimate uncertainty."},
    {heading:"Reading GLMM Output",visual:"output",
     body:"The model output table is your primary scientific report. Each row represents one fixed effect. The estimate tells you the direction and magnitude. The p-value tells you the probability of seeing an effect this large by chance if the true effect were zero."},
  ],quiz:[
    {q:"Why can't Vitagri use standard multiple regression?",options:["Regression requires too many computers","Multiple samples from the same farm are correlated \u2014 not independent","Regression only works with binary outcomes","The dataset has too many continuous variables"],correct:1},
    {q:"In a GLMM, what does the 'random effect' for each farm represent?",options:["A random sample of that farm's data","The farm's average nutrient density","Everything about that farm not captured by measured variables","The probability the farm is organic"],correct:2},
    {q:"A fixed effect of +1.24 for 'Cover crop (yes)' means:",options:["Cover crops are used on 1.24% of farms","Farms with cover crops have 1.24 mg/100g more iron on average","Cover crop use increases yield by 1.24 tonnes","The p-value for cover crops is 1.24"],correct:1},
    {q:"A GLMM shows p = 0.527 for soil pH. The best interpretation is:",options:["Soil pH definitely has no effect","This dataset does not provide sufficient evidence that pH affects iron","Soil pH increases iron by 52.7%","We should remove pH from all future models"],correct:1},
    {q:"AIC is used in model selection. AIC = 312 vs AIC = 341 \u2014 which is better?",options:["312 \u2014 lower AIC indicates better trade-off between fit and complexity","341 \u2014 larger numbers indicate better fit","They are equally good","More information is needed"],correct:0},
  ]},
  {id:6,title:"Gradient Boosting & XGBoost",icon:"\u26a1",sections:[
    {heading:"Decision Trees \u2014 The Building Block",visual:"dtree",
     body:"A single decision tree divides farms into groups by asking a series of yes/no questions about their farming variables. The result is interpretable \u2014 you can follow any path from root to leaf and explain the prediction. However, a single tree is fragile: small changes in training data can produce very different trees."},
    {heading:"From Trees to Gradient Boosting",visual:"boosting",
     body:"Gradient boosting builds trees sequentially. Tree 1 makes a rough prediction. Tree 2 focuses exclusively on correcting Tree 1\u2019s largest errors. XGBoost implements this with regularisation, parallel processing, and sophisticated handling of missing values."},
    {heading:"Feature Importance and SHAP Values",visual:"shap",
     body:"SHAP values give a theoretically grounded, consistent measure of each feature\u2019s contribution to each individual prediction. For Vitagri, SHAP values allow us to tell a farmer exactly why their farm scored as it did. This per-farm explainability is essential for farmer trust and scientific credibility."},
  ],quiz:[
    {q:"In a decision tree, what determines where each split is made?",options:["Random chance","The variable and threshold that best separates outcomes","The farmer's preference","The order variables appear in the dataset"],correct:1},
    {q:"How does gradient boosting differ from a single tree?",options:["It uses larger datasets","It only works for classification","It builds trees sequentially, each correcting previous errors","It is less accurate but faster"],correct:2},
    {q:"SHAP values allow Vitagri to:",options:["Speed up training","Explain to each farmer exactly why their score is what it is","Replace the GLMM entirely","Reduce the number of variables needed"],correct:1},
    {q:"XGBoost includes regularisation to:",options:["Speed up computation","Prevent overfitting by penalising complexity","Improve data collection","Handle missing values"],correct:1},
    {q:"SOM has SHAP importance 0.28, nitrogen rate 0.10. This means:",options:["SOM should be removed","Nitrogen rate has no effect","SOM contributes 2.8\u00d7 more to predictions","The model is overfitting to SOM"],correct:2},
  ]},
  {id:7,title:"Metabolomics & Microbial Data",icon:"\ud83e\udda0",sections:[
    {heading:"The Curse of Dimensionality \u2014 800 Metabolites, 30 Farms",visual:"pca",
     body:"With only 30 farms, fitting a model with 800 predictors is statistically disastrous. PCA solves this by finding the directions of maximum variation and projecting all samples onto a small number of principal components \u2014 800 measurements compressed into 15 components that capture 87% of the biological variation."},
    {heading:"Compositional Data \u2014 The Microbiome Problem",visual:"comp",
     body:"Microbial community data comes as relative abundances that sum to 100%. This creates spurious negative correlations. The solution is Centred Log-Ratio (CLR) transformation, which converts relative abundances into log-ratios relative to the geometric mean. After CLR, standard methods are valid."},
    {heading:"Diversity Metrics \u2014 Alpha and Beta Diversity",visual:"inline6",
     body:"Alpha diversity is a key predictor variable in Vitagri\u2019s model: farms with higher microbial diversity consistently show stronger nutrient density profiles. Beta diversity is used for clustering and identifying farm groupings."},
  ],quiz:[
    {q:"Why can't Vitagri use all 800 metabolite peaks directly?",options:["Equipment cannot measure 800 peaks","With 30 farms and 800 variables, the model would severely overfit","Metabolites are not related to farming","The GLMM cannot handle more than 50 variables"],correct:1},
    {q:"What does CLR transformation correct for?",options:["Non-normal distribution of soil variables","Spurious correlations from compositional data summing to 100%","Outliers in nitrogen rate","The nested structure of samples"],correct:1},
    {q:"A farm has Shannon alpha diversity = 3.9 vs another with 1.1. This indicates:",options:["3.9\u00d7 more bacteria","Much more diverse and evenly distributed community","Poor soil health","Shannon index is not relevant"],correct:1},
    {q:"PCA on 800 metabolites producing 15 components captures 87%. What happened to the remaining 13%?",options:["Added to GLMM as correction","Classified as noise and discarded","Stored in components 16\u2013800","Represents farming practice variation"],correct:1},
    {q:"Bray-Curtis dissimilarity of 0.82 between two farms means:",options:["They share 82% of species","Their microbial communities are very different","Both have high alpha diversity","They are 0.82 km apart"],correct:1},
  ]},
  {id:8,title:"Model Evaluation & Validation",icon:"\u2705",sections:[
    {heading:"Regression Metrics \u2014 How Wrong Are We?",visual:"errors",
     body:"MAE gives the average prediction error in the original units. RMSE penalises large errors more heavily. R\u00b2 gives the proportion of variance explained by the model. Vitagri\u2019s minimum threshold: R\u00b2\u22650.70, RMSE\u22641.0 mg/100g."},
    {heading:"Classification Metrics \u2014 The Confusion Matrix",visual:"cm",
     body:"When Vitagri makes a binary decision \u2014 \u2018certify\u2019 or \u2018do not certify\u2019 \u2014 the confusion matrix becomes essential. Drag the threshold slider to see the precision-recall trade-off. The F1 score balances both."},
    {heading:"ROC Curves and Model Calibration",visual:"roc",
     body:"The ROC curve plots the trade-off between true positive rate and false positive rate across ALL possible thresholds. AUC=0.91 means in 91% of randomly selected pairs, the model correctly scores the high-nutrient farm higher. Calibration \u2014 whether probability scores mean what they claim \u2014 is equally important."},
  ],quiz:[
    {q:"MAE = 0.4, RMSE = 1.1. What does the larger RMSE suggest?",options:["The model has more variables","A few farms have very large prediction errors","RMSE is always larger by a fixed amount","The model is underfitting"],correct:1},
    {q:"Reducing the classification threshold from 0.7 to 0.3 will generally:",options:["Increase both precision and recall","Increase recall but reduce precision","Reduce recall but increase precision","Have no effect"],correct:1},
    {q:"AUC of 0.91 means:",options:["91% of all farms correctly classified","In 91% of high-vs-low pairs, the model correctly ranks them","91% precision","9% false positive rate"],correct:1},
    {q:"R\u00b2 = 0.78 means:",options:["78% of farms accurately certified","The model explains 78% of variation in iron content","78% of variables are significant","Errors of 0.78 mg/100g on average"],correct:1},
    {q:"Model calibration refers to:",options:["Setting the optimal threshold","Whether probability scores accurately reflect true probabilities","Comparing against competitors","Removing poor variables"],correct:1},
  ]},
  {id:9,title:"The Bidirectional Architecture",icon:"\ud83d\udd04",sections:[
    {heading:"Full System Architecture",visual:"arch",
     body:"The Vitagri system architecture consists of three interlocking layers. The data layer collects and preprocesses all four streams. The modelling layer runs both forward and reverse models. The certification layer translates model outputs into confidence scores, audit reports, and financial rewards. Every certification feeds new labelled data back \u2014 this is the continuous learning loop."},
    {heading:"The Reverse Model \u2014 Biological Markers as Fingerprints",visual:"inline7",
     body:"C15:0 and C17:0 fatty acids are synthesised exclusively by bacteria in ruminant digestive systems. They cannot be supplemented into milk or meat \u2014 they are genuinely diagnostic of farming system. These biological constraints make the reverse model fraud-resistant."},
    {heading:"Confidence Scores \u2014 Probability into Decisions",visual:"gauge",
     body:"High confidence (\u226580%): issue certification. Borderline (60\u201380%): request additional samples. Low (<60%): certification withheld. All borderline and low scores are flagged for manual expert review."},
  ],quiz:[
    {q:"What makes the continuous learning loop important?",options:["It reduces data collection cost","Each new certified farm adds labelled data that improves future accuracy","It allows the model to run without oversight","It enables offline operation"],correct:1},
    {q:"C15:0 and C17:0 fatty acids are valuable biomarkers because:",options:["They can be tested cheaply","They are produced exclusively during ruminant digestion of living pasture \u2014 cannot be added artificially","They correlate with grain yield","They are the same as omega-3"],correct:1},
    {q:"A confidence score of 68% triggers:",options:["Immediate certification","Request for additional samples or revisit next season","Permanent removal from programme","Automatic GLMM retraining"],correct:1},
    {q:"The reverse model provides 'fraud-resistant' verification because:",options:["It uses blockchain","Biological markers arise from fundamental pathways that cannot be easily faked","It requires in-person inspection","Reverse models are more accurate"],correct:1},
    {q:"The relationship between forward and reverse models is best described as:",options:["Identical algorithms run in opposite directions","Reverse only used when forward fails","Together they create a closed verification loop","Forward is more important for certification"],correct:2},
  ]},
  {id:10,title:"From Theory to Practice",icon:"\ud83d\ude80",sections:[
    {heading:"The 8-Phase Implementation Pipeline",visual:"pipeline",
     body:"Vitagri\u2019s implementation follows a disciplined 8-phase pipeline. Click each phase above. The critical discipline is sequential completion \u2014 and pre-registration means publicly declaring hypotheses and methods BEFORE collecting data."},
    {heading:"Scientific Credibility \u2014 Publication Strategy",visual:"inline8",
     body:"Scientific credibility is not just academic \u2014 it is a commercial requirement. Retailers, healthcare organisations, and policy makers will only engage with Vitagri\u2019s certification if the underlying science is independently verifiable."},
    {heading:"Model Limitations and Honest Communication",visual:"inline9",
     body:"The Vitagri model is a decision-support tool, not an oracle. It makes probabilistic predictions based on patterns learned from a finite dataset. The virtuous data cycle is the key mechanism: more farms \u2192 more data \u2192 better model \u2192 more credible certifications \u2192 more farms join."},
  ],quiz:[
    {q:"Why must the analysis plan be pre-registered BEFORE data collection?",options:["Regulatory requirements","To prevent unconscious adjustment of hypotheses after seeing data (p-hacking)","It speeds up peer review","It allows other researchers to contribute"],correct:1},
    {q:"Cover crops are strongly associated with higher iron. The most accurate claim is:",options:["Cover crops cause higher iron","Cover crops are strongly associated with higher iron \u2014 causality would require controlled trials","Farmers using cover crops will definitely produce higher-iron food","The model proves the mechanism"],correct:1},
    {q:"The 'virtuous data cycle' means:",options:["Data quality improves automatically","More farms \u2192 more data \u2192 better model \u2192 more credible certifications \u2192 more farms","The model retrains itself without new data","Farmers' data is returned after use"],correct:1},
    {q:"A novel agroforestry farm scores 42% confidence. The most likely explanation is:",options:["Very poor nutrient density","The model is malfunctioning","The farm type is unlike anything in training data \u2014 insufficient evidence, not failure","Incomplete data collection"],correct:2},
    {q:"Vitagri's model is best described as:",options:["A universal oracle for food quality","A decision-support tool with probabilistic predictions and quantified uncertainty","A replacement for laboratory analysis","A regulatory compliance tool"],correct:1},
  ]},
];

// ─── INLINE VISUAL RENDERERS (static HTML blocks) ──────────────
function renderInlineVisual(key,el){
  const inlines={
    inline1:()=>`<div style="background:${C.white};border-radius:10px;padding:20px;border:2px solid ${C.teal}">
      <div style="font-weight:700;color:${C.soil};margin-bottom:12px">The Simplest Possible Model</div>
      <div style="background:${C.soil};border-radius:8px;padding:16px;font-family:monospace;margin-bottom:12px">
        <div style="color:${C.amber};font-size:14px">Iron (mg/100g) = <span style="color:${C.teal}">1.12</span> \u00d7 SOM% + <span style="color:${C.lime}">12.5</span></div>
        <div style="color:rgba(255,255,255,.4);font-size:11px;margin-top:8px">For a farm with 4% organic matter: Iron = 1.12 \u00d7 4 + 12.5 = <span style="color:${C.amber}">16.98 mg/100g</span></div>
      </div>
      <div class="grid-2">
        <div style="background:${C.teal}10;border-radius:6px;padding:10px"><div style="font-weight:700;color:${C.teal};font-size:12px">Coefficient: 1.12</div><div style="font-size:11px;color:${C.grey}">For every 1% increase in SOM, predicted iron rises by 1.12 mg/100g</div></div>
        <div style="background:${C.lime}10;border-radius:6px;padding:10px"><div style="font-weight:700;color:${C.tealDk};font-size:12px">Intercept: 12.5</div><div style="font-size:11px;color:${C.grey}">Baseline iron level when all inputs are zero</div></div>
